<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papeleta Licencia | Supabase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        :root {
            --bg-dark:#070707;
            --card-bg:#0d0606;
            --accent-red:#cc1b1b;
            --bright-red:#ff1a1a;
            --text-gray:#666;
            --input-white:#ffffff;
        }

        body {
            background:var(--bg-dark);
            color:#eee;
            font-family:Inter,sans-serif;
            margin:0;
            padding:40px;
            display:flex;
            flex-direction:column;
            align-items:center;
            user-select: none;
            overflow-x: hidden;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- MODALES --- */
        #customModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #0d0606;
            border: 2px solid var(--bright-red);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }
        .modal-content h2 { color: var(--bright-red); font-weight: 900; text-transform: uppercase; margin: 0; }
        .modal-input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px; border: none; text-align: center; font-weight: bold; }
        .btn-modal { background: var(--bright-red); color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 900; cursor: pointer; }
        .btn-modal.secondary { background: #333; margin-right: 10px; }

        .wrapper { width:100%; max-width:1200px; position: relative; z-index: 2; }
        .main-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; }
        .logo-square { border: 2px solid var(--bright-red); padding: 8px 12px; border-radius: 10px; font-weight: 900; font-size: 28px; color: var(--bright-red); }
        
        .stats { display:flex; gap:20px; }
        .stat-card { background:var(--card-bg); padding:12px 30px; border-radius:18px; border:1px solid #1a0d0d; text-align:center; }
        .stat-card strong { display:block; color:var(--bright-red); font-size:24px; }

        .dashboard-grid { display:grid; grid-template-columns:350px 1fr; gap:25px; }
        .card { background:var(--card-bg); border:1px solid #1a0d0d; border-radius:20px; padding:30px; }
        
        .input-group { margin-bottom:15px; }
        .input-group label { display:block; font-size:10px; font-weight:bold; color:var(--text-gray); margin-bottom:8px; }
        .input-group input { width:100%; padding:12px 15px; border-radius:10px; border:none; background:white; color:#111; box-sizing: border-box; }

        .btn-generate { width:100%; background:var(--bright-red); color:white; border:none; padding:15px; border-radius:10px; font-weight:900; cursor:pointer; }
        
        .output-area { background:#000; border-radius:15px; padding:20px; height: 300px; overflow: auto; border: 1px solid #1a1a1a; position: relative; }
        pre { color:#00ff44; font-family: monospace; font-size:13px; white-space: pre-wrap; user-select: text; }
        .btn-copy { position: absolute; top: 10px; right: 10px; background: #333; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 10px; }

        table { width:100%; border-collapse:collapse; }
        th { text-align:left; font-size:11px; color:var(--text-gray); padding-bottom:20px; }
        .status-dot { height:12px; width:12px; border-radius:50%; display:inline-block; cursor: pointer; }
        .status-on { background:#00ff44; box-shadow:0 0 10px #00ff44; }
        .status-off { background:#ff0000; box-shadow:0 0 10px #ff0000; }
        .btn-delete { background:none; border:none; color:#721c1c; font-weight:bold; cursor:pointer; }

        #lockScreen { position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999; }
    </style>
</head>

<body>

<div id="customModal">
    <div class="modal-content">
        <h2 id="mTitle">AVISO</h2>
        <p id="mMsg"></p>
        <input type="text" id="mInput" class="modal-input" style="display:none;">
        <div class="modal-btns">
            <button id="mCancel" class="btn-modal secondary" onclick="closePapeletaModal()">CANCELAR</button>
            <button class="btn-modal" onclick="confirmPapeletaModal()">ACEPTAR</button>
        </div>
    </div>
</div>

<div id="lockScreen">
    <div id="particles-js"></div>
    <div style="z-index:10; text-align:center;">
        <h2 style="font-weight:900;">ACCESO PANEL</h2>
        <input id="pinInput" type="password" placeholder="PIN" style="padding:15px; border-radius:10px; border:none; text-align:center;">
        <br><br>
        <button class="btn-generate" onclick="checkPIN()">ENTRAR</button>
    </div>
</div>

<div class="wrapper">
    <header class="main-header">
        <div style="display:flex; align-items:center; gap:15px;">
            <div class="logo-square">PL</div>
            <div>
                <h1 style="margin:0; font-size:24px; font-weight:900;">PAPELETA LICENCIA</h1>
                <button class="btn-modal" style="padding:5px 10px; font-size:10px; margin-top:5px;" onclick="showServerLua()">GENERAR SERVER.LUA</button>
            </div>
        </div>
        <div class="stats">
            <div class="stat-card"><span>TOTAL</span><strong id="total-count">0</strong></div>
            <div class="stat-card"><span>ACTIVAS</span><strong id="active-count">0</strong></div>
        </div>
    </header>

    <div class="dashboard-grid">
        <aside>
            <div class="card">
                <h3>NUEVA LICENCIA</h3>
                <div class="input-group">
                    <label>NOMBRE DEL RECURSO</label>
                    <input type="text" id="resourceName" placeholder="Ej: sistema_tienda">
                </div>
                <div class="input-group">
                    <label>IP SERVIDOR</label>
                    <input type="text" id="ipAddr" placeholder="123.456.78.90">
                </div>
                <button class="btn-generate" onclick="addLicense()">GENERAR Y ACTIVAR</button>
                <p id="statusLog" style="font-size:12px; color:#888; margin-top:10px;"></p>
            </div>
            <div class="card" style="margin-top:20px;">
                <h3>CÓDIGO LUA</h3>
                <div class="output-area">
                    <button class="btn-copy" onclick="copyText()">COPIAR</button>
                    <pre id="luaCode">-- Selecciona una fila para ver su config --</pre>
                </div>
            </div>
        </aside>

        <section class="card">
            <table id="licenseTable">
                <thead>
                    <tr>
                        <th>ESTADO</th>
                        <th>RECURSO</th>
                        <th>IP</th>
                        <th>USER</th>
                        <th>ACCIÓN</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // DATOS DE CONEXIÓN (De tus capturas)
    const SUPABASE_URL = 'https://wiuabkrcqvdvjljrfcqk.supabase.co'
    const SUPABASE_KEY = 'sb_publicable_tIEUlf0b8ixdp2zKpEjvMA_Ht2e1N...' // PEGA TU KEY COMPLETA AQUÍ
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    let PIN_MAESTRO = "1212";
    let modalAction = null;

    // --- FUNCIONES DE INICIO ---
    async function init() {
        // Cargar Config (PIN)
        const { data: cfg } = await supabase.from('configuracion').select('*').eq('id', 1).single();
        if(cfg) PIN_MAESTRO = cfg.pin;
        
        loadLicenses();
        
        // Tiempo real
        supabase.channel('cambios').on('postgres_changes', { event: '*', schema: 'public', table: 'licencias' }, loadLicenses).subscribe();
        
        particlesJS("particles-js", {
            "particles": { "number": { "value": 60 }, "color": { "value": "#ff1a1a" }, "line_linked": { "enable": true, "color": "#ff1a1a" } }
        });
    }

    async function loadLicenses() {
        const { data, error } = await supabase.from('licencias').select('*').order('created_at', { ascending: false });
        if(error) return console.error(error);
        
        const tbody = document.querySelector("#licenseTable tbody");
        tbody.innerHTML = "";
        let activas = 0;

        data.forEach(lic => {
            if(lic.active) activas++;
            const row = document.createElement("tr");
            row.style.cursor = "pointer";
            row.innerHTML = `
                <td><span class="status-dot ${lic.active?'status-on':'status-off'}" onclick="event.stopPropagation(); window.toggleStatus('${lic.id}', ${lic.active})"></span></td>
                <td style="color:red; font-weight:900;">${lic.resource}</td>
                <td>${lic.ip}</td>
                <td style="font-size:10px; color:#888;">${lic.user}</td>
                <td><button class="btn-delete" onclick="event.stopPropagation(); window.remove('${lic.id}')">BORRAR</button></td>
            `;
            row.onclick = () => showLuaConfig(lic.user, lic.key);
            tbody.appendChild(row);
        });

        document.getElementById("total-count").innerText = data.length;
        document.getElementById("active-count").innerText = activas;
    }

    // --- ACCIONES ---
    window.addLicense = async () => {
        const res = document.getElementById("resourceName").value.trim().toUpperCase();
        const ip = document.getElementById("ipAddr").value.trim();
        if(!res || !ip) return alert("Faltan datos");

        const id = Date.now().toString();
        const { error } = await supabase.from('licencias').insert([{
            id, resource: res, ip,
            user: "USER_" + Math.random().toString(36).substring(7).toUpperCase(),
            key: Math.random().toString(36).substring(2).toUpperCase(),
            active: true
        }]);

        if(!error) {
            document.getElementById("resourceName").value = "";
            document.getElementById("ipAddr").value = "";
            document.getElementById("statusLog").innerText = "✅ Guardado con éxito";
        } else {
            document.getElementById("statusLog").innerText = "❌ Error Supabase";
        }
    }

    window.toggleStatus = async (id, stat) => await supabase.from('licencias').update({ active: !stat }).eq('id', id);
    window.remove = async (id) => { if(confirm("¿Borrar licencia?")) await supabase.from('licencias').delete().eq('id', id); };

    window.showLuaConfig = (u, k) => {
        document.getElementById("luaCode").innerText = `configLicense = {\n    ["User"] = "${u}",\n    ["Key"] = "${k}"\n}`;
    };

    window.showServerLua = () => {
        document.getElementById("luaCode").innerText = `-- SERVER.LUA (COPIA ESTO)\n\nlocal function check() \n  fetchRemote("https://wiuabkrcqvdvjljrfcqk.supabase.co/rest/v1/licencias?user=eq."..configLicense.User, function(data, err)\n    -- Aquí va la validación con Supabase\n  end)\nend`;
    };

    window.checkPIN = () => {
        if(document.getElementById("pinInput").value === PIN_MAESTRO) document.getElementById("lockScreen").style.display = "none";
        else alert("PIN INCORRECTO");
    };

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
