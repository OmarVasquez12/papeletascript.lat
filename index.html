<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenix Elite • Login Discord</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 360px;
    background: #111;
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 0 30px rgba(0,0,0,.6);
    text-align: center;
    color: white;
}

.logo {
    font-size: 38px;
    margin-bottom: 25px;
}

.logo span {
    color: #ff9f1c;
}

/* BOTÓN DISCORD */
.discord-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #5865F2;
    padding: 14px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: transform 0.2s, box-shadow 0.2s;
}

.discord-btn img {
    width: 26px;
    filter: invert(1);
}

.discord-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.5);
}

.note {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="card">
    <div class="logo">🔥 <span>Fenix</span> Elite</div>

    <div class="discord-btn" onclick="loginDiscord()">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg">
        <span>Iniciar con Discord</span>
    </div>

    <div class="note">
        Login seguro mediante Discord
    </div>
</div>

<script>
function loginDiscord() {
    const CLIENT_ID = "TU_CLIENT_ID_DISCORD";
    const REDIRECT_URI = "https://tupagina.com/callback"; // puede ser cualquiera
    const SCOPE = "identify";

    const url =
        "https://discord.com/oauth2/authorize" +
        "?client_id=" + CLIENT_ID +
        "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
        "&response_type=token" +
        "&scope=" + SCOPE;

    window.location.href = url;
}
</script>

</body>
</html>
