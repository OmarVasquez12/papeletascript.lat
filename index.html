<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="data:," />
    <meta charset="UTF-8">
    <title>Fenix Elite Pvp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos CSS aquí (sin cambios) */
    </style>
</head>
<body>

<div class="notify" id="notifyBox"></div>

<div class="card" id="loginBox">
    <div class="logo">Fenix <span>Elite</span></div>
    <input id="lUser" placeholder="Usuario">
    <input id="lPass" type="password" placeholder="Contraseña">
    <label style="display:flex;align-items:center;font-size:13px;margin-top:5px;">
        <input type="checkbox" id="rememberCheck" style="margin-right:5px;"> Recordar contraseña
    </label>
    <button onclick="login()">Iniciar sesión</button>
    <div class="switch" onclick="showRegister()">Crear cuenta</div>
    <div class="msg" id="msg"></div>
</div>

<div class="card" id="registerBox" style="display:none">
    <div class="logo">Registrar <span>Cuenta</span></div>
    <input id="rUser" placeholder="Usuario">
    <input id="rPass" type="password" placeholder="Contraseña">
    <input id="rPass2" type="password" placeholder="Confirmar Contraseña">
    <button onclick="register()">Registrar</button>
    <div class="switch" onclick="showLogin()">Volver al Login</div>
    <div class="msg" id="rmsg"></div>
</div>

<div id="main">
    <div class="userLabel" id="userLabel"></div>
    <div class="configBtn" id="configBtn" onclick="toggleConfig()" style="display:none">CONFIG</div>
</div>

<div class="config" id="config">
    <div class="section">
        <button onclick="closeConfig()" style="background:#ffffff;margin-bottom:10px;">Volver</button>
    </div>

    <div class="section">
        <h3>GESTIÓN GENERAL</h3>
        <button onclick="borrarTodo()" style="background:red;color:white;">Borrar todas las cuentas</button>
    </div>

    <div class="section" id="sectionUsers">
        <h3>USUARIOS REGISTRADOS</h3>
        <button onclick="toggleUserPanel()">USERS</button>
        <div id="userPanel" style="display: none;">
            <div style="margin-bottom:10px;">
                <input type="text" id="searchUser" placeholder="Buscar usuario..." style="width:100%;padding:8px;border-radius:8px;border:none;margin-bottom:5px;">
                <select id="filterRole" style="width:100%;padding:8px;border-radius:8px;border:none;">
                    <option value="all">Todos los roles</option>
                    <option value="user">User</option>
                    <option value="mod">Mod</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div id="userList"></div>
        </div>
    </div>

    <div class="section" id="sectionID">
        <h3>GENERADOR DE ID</h3>
        <button onclick="genID()">Generar ID</button>
        <div class="idBox" id="idBox"></div>
    </div>

    <div class="section" id="sectionACL">
        <h3>GESTIÓN ACL</h3>
        <input id="aclUserID" placeholder="ID del usuario">
        <select id="aclRole">
            <option value="user">User</option>
            <option value="mod">Mod</option>
            <option value="admin">Admin</option>
        </select>
        <button onclick="setACL()">Configurar ACL</button>
        <div class="msg" id="aclMsg"></div>
    </div>

    <div class="section" id="sectionInfo">
        <h3>CONFIGURACIÓN VISUAL</h3>
        <button onclick="showNotify()">Qué puedo cambiar</button>
        <div style="margin-top:10px;">
            <label>Fondo del panel: <input type="color" id="bgColor" class="colorPicker" value="#111111" onchange="updateColor('bg')"></label>
            <label>Color de botones: <input type="color" id="btnColor" class="colorPicker" value="#ff9f1c" onchange="updateColor('btn')"></label>
            <label>Color del texto: <input type="color" id="textColor" class="colorPicker" value="#ffffff" onchange="updateColor('text')"></label>
            <label>Color de títulos: <input type="color" id="titleColor" class="colorPicker" value="#ff9f1c" onchange="updateColor('title')"></label>
        </div>
    </div>
</div>

<script>
function showNotify(){
    const notify = document.getElementById('notifyBox');
    notify.innerHTML = "Aquí puedes cambiar: Fondo, Botones, Texto y Títulos";
    notify.classList.add('show');
    setTimeout(()=>{ notify.classList.remove('show'); }, 3500);
}

function closeConfig(){ document.getElementById("config").classList.remove("open"); }

if(!localStorage.getItem("fx_last_id")) localStorage.setItem("fx_last_id","1");
let adminData = JSON.parse(localStorage.getItem("fx_Omar") || "{}");
if(!adminData.pass){ adminData = {pass:"1234", role:"admin", id:1}; localStorage.setItem("fx_Omar", JSON.stringify(adminData));}

let currentUser=null;
let currentRole=null;
let currentUserID=null;
let userPanelVisible=false;

const msg=document.getElementById("msg");
const rmsg=document.getElementById("rmsg");

function login(){
    const u=document.getElementById("lUser").value.trim();
    const p=document.getElementById("lPass").value;
    const remember=document.getElementById("rememberCheck").checked;
    const data=JSON.parse(localStorage.getItem("fx_" + u) || "null");
    if(!data || data.pass !== p){ msg.innerText="Login incorrecto"; return;}
    currentUser = u;
    currentRole = data.role;
    if(!data.id){ let lastId = parseInt(localStorage.getItem("fx_last_id") || "1"); lastId++; data.id = lastId; localStorage.setItem("fx_last_id", lastId); localStorage.setItem("fx_" + u, JSON.stringify(data)); }
    currentUserID = data.id;
    document.getElementById("loginBox").style.display="none";
    document.getElementById("registerBox").style.display="none";
    document.getElementById("main").style.display="block";
    document.getElementById("userLabel").innerText=currentUser + " | ID: " + currentUserID;
    if(currentRole==="admin" || currentRole==="mod"){ document.getElementById("configBtn").style.display="block";}
    if(remember){ localStorage.setItem("fx_saved_login", JSON.stringify({user:u, pass:p, remember:true})); }
    else{ localStorage.setItem("fx_saved_login", JSON.stringify({user:u, remember:false})); }
    logConnection(u);
	// Actualizar el panel de usuarios después de iniciar sesión
    if(userPanelVisible){
        loadUsers(currentRole === "admin" || currentRole === "mod" || currentUserID === 1);
    }
}

window.onload = function(){
    const saved = JSON.parse(localStorage.getItem("fx_saved_login")||"{}");
    if(saved.user){ document.getElementById("lUser").value = saved.user;
        if(saved.remember && saved.pass) document.getElementById("lPass").value = saved.pass;
        document.getElementById("rememberCheck").checked = !!saved.remember;
    }
};

function showRegister(){loginBox.style.display="none"; registerBox.style.display="block"; msg.innerText=""; rmsg.innerText="";}
function showLogin(){registerBox.style.display="none"; loginBox.style.display="block"; msg.innerText=""; rmsg.innerText="";}
function register(){
    const u = document.getElementById("rUser").value.trim();
    const p = document.getElementById("rPass").value;
    const p2 = document.getElementById("rPass2").value;
    if(!u || !p || !p2){ rmsg.innerText="Completa todos los campos"; return;}
    if(p !== p2){ rmsg.innerText="Contraseñas no coinciden"; return;}
    if(localStorage.getItem("fx_"+u)){ rmsg.innerText="Usuario ya existe"; return;}
    
    let lastId = parseInt(localStorage.getItem("fx_last_id") || "1"); lastId++;
    localStorage.setItem("fx_last_id", lastId);
    localStorage.setItem("fx_"+u, JSON.stringify({pass:p, role:"user", id:lastId}));
    
    rmsg.style.color="lightgreen"; 
    rmsg.innerText = `Cuenta creada! Tu ID es ${lastId}`;

    // Registrar la conexión
    logConnection(u);

    // Si el panel de usuarios está abierto, recargar para mostrar la nueva cuenta
    if(userPanelVisible){
        loadUsers(currentRole === "admin" || currentRole === "mod" || currentUserID === 1);
    }

    setTimeout(showLogin, 1200);
}

function logConnection(u){
    const data = JSON.parse(localStorage.getItem("fx_" + u) || "{}");
    if(!data.id) return; 
    let list = JSON.parse(localStorage.getItem("fx_log") || "[]");

    const existingIndex = list.findIndex(item => item.user === u);
    const entry = { user: u, id: data.id, role: data.role || "user" };

    if(existingIndex !== -1){
        list[existingIndex] = entry; 
    } else {
        list.push(entry); 
    }

    localStorage.setItem("fx_log", JSON.stringify(list));

    // Actualizar panel en tiempo real si está visible
    if(userPanelVisible){
        loadUsers(currentRole === "admin" || currentRole === "mod" || currentUserID === 1);
    }
}


function toggleConfig(){ document.getElementById("config").classList.toggle("open"); loadConfigSections(); }
function loadConfigSections(){
    const isAdmin = currentRole==="admin";
    const isMod = currentRole==="mod";
    document.getElementById("sectionUsers").style.display=(isAdmin||isMod)?"block":"none";
    document.getElementById("sectionID").style.display=(isAdmin||isMod)?"block":"none";
    document.getElementById("sectionACL").style.display=isAdmin?"block":"none"; 
    if(isAdmin||isMod) loadUsers(isAdmin);
}

function borrarTodo() {
    // Recorremos todas las claves de localStorage
    Object.keys(localStorage).forEach(key => {
        // Solo borramos las claves relacionadas con usuarios y configuración
        if(key.startsWith("fx_")) {
            localStorage.removeItem(key);
        }
    });

    // Opcional: mostrar notificación
    const notify = document.getElementById('notifyBox');
    notify.innerText = "¡Todas las cuentas han sido borradas!";
    notify.classList.add('show');
    setTimeout(()=>{ notify.classList.remove('show'); }, 3000);

    // Refrescar la página para empezar limpio
    setTimeout(()=>{ location.reload(); }, 1000);
}


function loadUsers(){
    const listDiv = document.getElementById("userList");
    listDiv.innerHTML = "";

    const searchText = document.getElementById("searchUser").value.toLowerCase();
    const filterRole = document.getElementById("filterRole").value;

    Object.keys(localStorage).forEach(key => {
        if(!key.startsWith("fx_") || key==="fx_saved_login" || key==="fx_last_id") return;
        const entry = JSON.parse(localStorage.getItem(key));
        const username = key.replace("fx_", "");
        const role = entry.role || "user";

        if(filterRole !== "all" && role !== filterRole) return;
        if(searchText && !username.toLowerCase().includes(searchText)) return;

        // Mostrar usuarios solo si eres admin o mod
        if(currentRole === "admin" || currentRole === "mod"){
            const displayId = entry.id || "(sin ID)";
            const html = `<div class="userRow" style="color:${role==='admin'?'red':role==='mod'?'orange':'white'};">
                            <b>${username}</b> | ID: ${displayId} | Rol: ${role}
                            <button style="float:right;padding:3px 6px;border:none;border-radius:5px;background:#ff9f1c;color:#111;cursor:pointer;" onclick="copyID('${displayId}')">Copiar ID</button>
                          </div>`;
            listDiv.innerHTML += html;
        }
    });
}


// Copiar ID
function copyID(id){
    navigator.clipboard.writeText(id);
    const notify = document.getElementById('notifyBox');
    notify.innerText = `ID ${id} copiado al portapapeles`;
    notify.classList.add('show');
    setTimeout(()=>{ notify.classList.remove('show'); }, 2500);
}

function toggleUserPanel(){ 
    userPanelVisible = !userPanelVisible; 
    const panel = document.getElementById("userPanel");
    panel.style.display = userPanelVisible ? "block" : "none"; 

    if(userPanelVisible) {
        // Admin ID 1 siempre puede ver todo
        loadUsers(currentRole === "admin" || currentRole === "mod" || currentUserID === 1);
    }
}


// Filtrado en tiempo real
document.getElementById("searchUser").addEventListener("input", () => {
    loadUsers(currentRole === "admin" || currentRole === "mod");
});
document.getElementById("filterRole").addEventListener("change", () => {
    loadUsers(currentRole === "admin" || currentRole === "mod");
});

// Scroll con rueda del mouse
const userPanel = document.getElementById("userPanel");
userPanel.addEventListener("wheel", function(e){
    e.preventDefault();
    userPanel.scrollTop += e.deltaY;
});

setInterval(()=> {
    if(userPanelVisible){
        loadUsers(currentRole === "admin" || currentRole === "mod");
    }
}, 3000);

function genID(){ 
    const id="GEN-"+Math.random().toString(36).substr(2,10).toUpperCase(); 
    document.getElementById("idBox").innerText=id; 
    navigator.clipboard.writeText(id); 
}

function setACL(){ 
    const id = parseInt(document.getElementById("aclUserID").value); 
    const newRole = document.getElementById("aclRole").value; 
    const aclMsg = document.getElementById("aclMsg"); 
    if(!id || !newRole){ aclMsg.innerText="Completa todos los campos"; return; }

    let found = false;
    Object.keys(localStorage).forEach(key=>{
        if(key.startsWith("fx_")){
            let u = JSON.parse(localStorage.getItem(key));
            if(u.id===id){ 
                u.role = newRole; 
                localStorage.setItem(key, JSON.stringify(u)); 
                found = true; 
            } 
        }
    });

    if(found){ 
        aclMsg.style.color="lightgreen"; 
        aclMsg.innerText=`ACL del usuario ID ${id} actualizada a ${newRole}`; 
        loadUsers(true); 
    } else { 
        aclMsg.style.color="red"; 
        aclMsg.innerText="Usuario no encontrado"; 
    }
}

function updateColor(type){
    const bg = document.getElementById("bgColor").value;
    const btn = document.getElementById("btnColor").value;
    const text = document.getElementById("textColor").value;
    const title = document.getElementById("titleColor").value;

    if(type==='bg' || type==='all') document.querySelectorAll('.card, .config').forEach(el=>el.style.background=bg);
    if(type==='btn' || type==='all') document.querySelectorAll('button').forEach(el=>el.style.background=btn);
    if(type==='text' || type==='all') document.querySelectorAll('body, input, select, .msg, .userLabel').forEach(el=>el.style.color=text);
    if(type==='title' || type==='all') document.querySelectorAll('.logo, .section h3').
}
</script>

</body>
</html>
