<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papeleta Licencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        :root {
            --bg-dark:#070707;
            --card-bg:#0d0606;
            --accent-red:#cc1b1b;
            --bright-red:#ff1a1a;
            --text-gray:#666;
            --input-white:#ffffff;
        }

        body {
            background:var(--bg-dark);
            color:#eee;
            font-family:Inter,sans-serif;
            margin:0;
            padding:40px;
            display:flex;
            flex-direction:column;
            align-items:center;
            user-select: none;
            overflow-x: hidden;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            z-index: 1;
        }

        /* --- MODAL PERSONALIZADO PROFESIONAL --- */
        #customModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--card-bg);
            border: 2px solid var(--bright-red);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 0 30px rgba(255, 26, 26, 0.2);
        }
        .modal-content h2 { color: var(--bright-red); margin-top: 0; font-size: 22px; font-weight: 900; }
        .modal-content p { font-weight: bold; margin: 20px 0; color: #fff; }
        .modal-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: none;
            background: white;
            color: black;
            font-weight: bold;
            text-align: center;
        }
        .modal-actions { display: flex; gap: 10px; justify-content: center; }
        .btn-modal {
            background: var(--bright-red);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-modal.cancel { background: #333; }
        .btn-modal:hover { transform: scale(1.05); }

        /* --- ESTILOS PANEL --- */
        .wrapper { width:100%; max-width:1200px; position: relative; z-index: 2; }
        .brand-container { display: flex; align-items: center; gap: 15px; }
        .logo-square {
            border: 2px solid var(--bright-red);
            padding: 8px 12px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 28px;
            color: var(--bright-red);
            line-height: 1;
        }
        .brand-text h1 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: 1px; }
        .brand-text p { margin: 0; color: var(--text-gray); font-size: 11px; font-weight: bold; text-transform: uppercase; }

        .main-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; }
        .stats { display:flex; gap:20px; }
        .stat-card { background:var(--card-bg); padding:12px 30px; border-radius:18px; text-align:center; border:1px solid #1a0d0d; }
        .stat-card strong { display:block; color:var(--bright-red); font-size:24px; }
        
        .dashboard-grid { display:grid; grid-template-columns:350px 1fr; gap:25px; }
        .card { background:var(--card-bg); border:1px solid #1a0d0d; border-radius:20px; padding:30px; margin-bottom:20px; }
        
        .input-group { margin-bottom:15px; }
        .input-group label { display:block; font-size:10px; font-weight:bold; color:var(--text-gray); margin-bottom:8px; }
        .input-group input {
            width:100%; padding:12px 15px; border-radius:10px; border:none;
            background:var(--input-white); color:#111; outline:none; box-sizing:border-box;
        }

        .btn-generate {
            width:100%; background:var(--bright-red); color:white; border:none;
            padding:15px; border-radius:10px; font-weight:900; cursor:pointer;
        }

        .output-area { background:#000; border-radius:10px; padding:15px; position: relative; margin-bottom: 10px; }
        pre { color:#00ff44; font-family:monospace; font-size:12px; margin:0; white-space:pre-wrap; user-select: text; overflow-x: auto; }

        table { width:100%; border-collapse:collapse; }
        th { text-align:left; font-size:11px; color:var(--text-gray); padding-bottom:20px; }
        .status-dot { height:12px; width:12px; border-radius:50%; display:inline-block; cursor: pointer; }
        .status-on { background:#00ff44; box-shadow:0 0 10px #00ff44; }
        .status-off { background:#ff0000; box-shadow:0 0 10px #ff0000; }

        .editable-item { cursor: pointer; border-bottom: 1px dashed #555; }
        .btn-delete { background:none; border:none; color:#721c1c; font-weight:bold; cursor:pointer; }

        #lockScreen { position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999; }
        #loginBox { background:#0d0606; padding:40px; border-radius:20px; text-align:center; border:1px solid #1a0d0d; position: relative; z-index: 5; }
    </style>
</head>

<body oncontextmenu="openModal('DIME TE LA QUIERE ROBAR', 'alert'); return false;">

<div id="customModal">
    <div class="modal-content">
        <h2 id="modalTitle">PAPELETA LICENCIA</h2>
        <p id="modalMessage"></p>
        <input type="text" id="modalInput" class="modal-input" style="display:none;">
        <div class="modal-actions">
            <button id="btnCancel" class="btn-modal cancel" onclick="closeModal()">CANCELAR</button>
            <button id="btnConfirm" class="btn-modal" onclick="confirmModal()">ACEPTAR</button>
        </div>
    </div>
</div>

<div id="lockScreen">
    <div id="particles-js"></div>
    <div id="loginBox">
        <div class="logo-square" style="display:inline-block; margin-bottom:20px;">PL</div>
        <h2>SISTEMA PRIVADO</h2>
        <input id="pinInput" type="password" placeholder="PIN DE ACCESO" style="padding:15px; text-align:center; border-radius:10px; border:none; width:200px; margin-bottom:20px;">
        <button class="btn-generate" onclick="checkPIN()">ENTRAR AL PANEL</button>
    </div>
</div>

<div class="wrapper">
    <header class="main-header">
        <div class="brand-container">
            <div class="logo-square">PL</div>
            <div class="brand-text">
                <h1>PAPELETA LICENCIA</h1>
                <p>ADMINISTRACIÓN DE RECURSOS PRO</p>
            </div>
        </div>
        <div class="stats">
            <div class="stat-card"><span>TOTAL</span><strong id="total-count">0</strong></div>
            <div class="stat-card"><span>ACTIVAS</span><strong id="active-count">0</strong></div>
        </div>
    </header>

    <div class="dashboard-grid">
        <aside>
            <div class="card">
                <h3>GENERAR LICENCIA</h3>
                <div class="input-group">
                    <label>NOMBRE DEL RECURSO</label>
                    <input type="text" id="resourceName" placeholder="Ej: sistema_facciones">
                </div>
                <div class="input-group">
                    <label>IP DEL SERVIDOR</label>
                    <input type="text" id="ipAddr" placeholder="Ej: 192.168.1.1">
                </div>
                <button class="btn-generate" onclick="addLicense()">ACTIVAR AHORA</button>
            </div>
            
            <div class="card">
                <h3>SERVER.LUA (CÓDIGO)</h3>
                <div class="output-area">
                    <pre id="luaCode">-- Selecciona una licencia para ver su config</pre>
                </div>
                <button class="btn-generate" style="margin-top:10px; background:#333;" onclick="copyLua()">COPIAR LUA COMPLETO</button>
            </div>
        </aside>

        <section>
            <div class="card" style="overflow-x:auto;">
                <table id="licenseTable">
                    <thead>
                        <tr>
                            <th>ESTADO</th>
                            <th>RECURSO</th>
                            <th>IP SERVIDOR</th>
                            <th>USUARIO</th>
                            <th>KEY</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWggE0KFiVZDxwxvmhuWXEKu6bNguV0mM",
        authDomain: "papeletalicencia.firebaseapp.com",
        projectId: "papeletalicencia",
        storageBucket: "papeletalicencia.firebasestorage.app",
        messagingSenderId: "677208314051",
        appId: "1:677208314051:web:c7d73ffc1905c235f29276"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let PIN_MAESTRO = "1212";
    let modalResolve;

    // --- LÓGICA DE MODALES (SIN NAVEGADOR) ---
    window.openModal = (msg, type = 'alert', defaultValue = '') => {
        return new Promise((resolve) => {
            const m = document.getElementById("customModal");
            const input = document.getElementById("modalInput");
            document.getElementById("modalMessage").innerText = msg;
            
            input.style.display = (type === 'prompt') ? 'block' : 'none';
            input.value = defaultValue;
            document.getElementById("btnCancel").style.display = (type === 'alert') ? 'none' : 'block';
            
            m.style.display = "flex";
            modalResolve = resolve;
        });
    };

    window.confirmModal = () => {
        const val = document.getElementById("modalInput").value;
        document.getElementById("customModal").style.display = "none";
        modalResolve(val || true);
    };

    window.closeModal = () => {
        document.getElementById("customModal").style.display = "none";
        modalResolve(null);
    };

    // --- SEGURIDAD ---
    window.checkPIN = () => {
        const pin = document.getElementById("pinInput").value;
        if(pin === PIN_MAESTRO) {
            document.getElementById("lockScreen").style.display = "none";
            initParticles();
        } else {
            openModal("PIN INCORRECTO", "alert");
        }
    };

    // --- ACCIONES DE TABLA ---
    window.editField = async (id, field, current) => {
        const newValue = await openModal(`EDITAR ${field.toUpperCase()}:`, 'prompt', current);
        if(newValue) {
            await updateDoc(doc(db, "licencias", id), { [field]: newValue });
        }
    };

    window.toggleStatus = async (id, status) => {
        await updateDoc(doc(db, "licencias", id), { active: !status });
    };

    window.deleteLic = async (id) => {
        const confirm = await openModal("¿ELIMINAR ESTA LICENCIA?", "prompt");
        if(confirm) await deleteDoc(doc(db, "licencias", id));
    };

    window.addLicense = async () => {
        const res = document.getElementById("resourceName").value;
        const ip = document.getElementById("ipAddr").value;
        if(!res || !ip) return openModal("RELLENA TODOS LOS CAMPOS");

        const id = Date.now().toString();
        await setDoc(doc(db, "licencias", id), {
            id, resource: res, ip: ip,
            user: "USER_" + Math.random().toString(36).substring(7).toUpperCase(),
            key: "KEY_" + Math.random().toString(36).substring(2).toUpperCase(),
            active: true
        });
        openModal("LICENCIA CREADA CON ÉXITO");
    };

    // --- RENDERIZADO ---
    onSnapshot(collection(db, "licencias"), (snap) => {
        const tbody = document.querySelector("#licenseTable tbody");
        tbody.innerHTML = "";
        let t = 0; let a = 0;
        snap.forEach(d => {
            const l = d.data();
            t++; if(l.active) a++;
            const row = document.createElement("tr");
            row.innerHTML = `
                <td><span class="status-dot ${l.active?'status-on':'status-off'}" onclick="toggleStatus('${l.id}', ${l.active})"></span></td>
                <td style="color:red; font-weight:bold;">${l.resource}</td>
                <td class="editable-item" onclick="editField('${l.id}','ip','${l.ip}')">${l.ip}</td>
                <td class="editable-item" onclick="editField('${l.id}','user','${l.user}')">${l.user}</td>
                <td class="editable-item" onclick="editField('${l.id}','key','${l.key}')">${l.key.substring(0,8)}...</td>
                <td><button class="btn-delete" onclick="deleteLic('${l.id}')">✖</button></td>
            `;
            row.onclick = (e) => { 
                if(e.target.tagName !== 'BUTTON' && !e.target.classList.contains('editable-item')) {
                    document.getElementById("luaCode").innerText = `configLicense = {\n    ["User"] = "${l.user}",\n    ["Key"] = "${l.key}"\n}`;
                }
            };
            tbody.appendChild(row);
        });
        document.getElementById("total-count").innerText = t;
        document.getElementById("active-count").innerText = a;
    });

    window.copyLua = () => {
        const code = `local function clean(s) return tostring(s):gsub("%s+", "") end
local function cargarScriptPrincipal()
    if _G["ScriptYaCargado"] then return end
    _G["ScriptYaCargado"] = true
end

local function iniciarValidacion()
    local resourceName = getResourceName(getThisResource())
    if not isObjectInACLGroup("resource." .. resourceName, aclGetGroup("Admin")) then
        outputDebugString("[Papeleta Progamador] ERROR Dale permiso acl.", 1)
        return false 
    end
    -- [Resto del código de validación...]
end`;
        navigator.clipboard.writeText(code);
        openModal("CÓDIGO COPIADO AL PORTAPAPELES");
    };

    function initParticles() {
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 50 },
                "color": { "value": "#ff1a1a" },
                "line_linked": { "enable": true, "color": "#ff1a1a" },
                "move": { "enable": true, "speed": 3 }
            }
        });
    }
</script>
</body>
</html>
