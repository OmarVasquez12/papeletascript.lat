<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papeleta Licencia - Panel Auto-Configurable</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        :root {
            --bg-dark:#070707;
            --card-bg:#0d0606;
            --accent-red:#cc1b1b;
            --bright-red:#ff1a1a;
            --text-gray:#666;
            --input-white:#ffffff;
        }

        body {
            background:var(--bg-dark);
            color:#eee;
            font-family:Inter,sans-serif;
            margin:0;
            padding:40px;
            display:flex;
            flex-direction:column;
            align-items:center;
            user-select: none;
            overflow-x: hidden;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #customModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #0d0606;
            border: 2px solid var(--bright-red);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }
        .modal-content h2 { 
            color: var(--bright-red); 
            margin-top: 0; 
            font-size: 24px; 
            font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .modal-content p {
            font-size: 18px;
            margin: 20px 0;
            color: white;
            line-height: 1.4;
        }
        .modal-input {
            width: 100%; padding: 15px; margin-bottom: 25px; border-radius: 12px;
            border: none; background: white; color: black; font-weight: bold; 
            text-align: center; box-sizing: border-box; font-size: 16px;
        }
        .modal-btns { display: flex; gap: 20px; justify-content: center; }
        .btn-modal {
            background: var(--bright-red); color: white; border: none;
            padding: 12px 35px; border-radius: 12px; font-weight: 900; 
            cursor: pointer; font-size: 16px; text-transform: uppercase;
        }
        .btn-modal.secondary { background: #333; }

        .wrapper { width:100%; max-width:1200px; position: relative; z-index: 2; }
        .brand-container { display: flex; align-items: center; gap: 15px; }
        .logo-square {
            border: 2px solid var(--bright-red);
            padding: 8px 12px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 28px;
            color: var(--bright-red);
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-text h1, .brand-text h2 {
            margin: 0; font-size: 28px; font-weight: 900; letter-spacing: 1px;
            text-shadow: 2px 0px 0px rgba(255, 0, 0, 0.3);
        }

        .brand-text p {
            margin: 0; color: var(--text-gray); font-size: 11px; font-weight: bold;
            letter-spacing: 1px; text-transform: uppercase;
        }

        .main-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; }
        .stats { display:flex; gap:20px; }
        .stat-card {
            background:var(--card-bg); padding:12px 30px; border-radius:18px;
            text-align:center; border:1px solid #1a0d0d;
        }
        .stat-card strong { display:block; color:var(--bright-red); font-size:24px; }
        .dashboard-grid { display:grid; grid-template-columns:350px 1fr; gap:25px; }
        .card { background:var(--card-bg); border:1px solid #1a0d0d; border-radius:20px; padding:30px; margin-bottom:20px; }
        
        .input-group { margin-bottom:15px; }
        .input-group label { display:block; font-size:10px; font-weight:bold; color:var(--text-gray); margin-bottom:8px; }
        .input-group input {
            width:100%; padding:12px 15px; border-radius:10px; border:none;
            background:var(--input-white); color:#111; outline:none; box-sizing:border-box;
        }

        .btn-generate {
            width:100%; background:var(--bright-red); color:white; border:none;
            padding:15px; border-radius:10px; font-weight:900; cursor:pointer;
            transition: 0.2s; position: relative; z-index: 10;
        }
        .btn-generate:hover { background: #e60000; transform: scale(1.02); }
        .btn-action-small {
            background: #333; color: #fff; border: none; padding: 6px 12px;
            border-radius: 6px; font-size: 10px; cursor: pointer; margin-top: 5px;
        }

        .config-panel {
            display: none; background: rgba(255,255,255,0.05); padding: 15px;
            border-radius: 10px; border: 1px solid #333; margin-top: 10px;
        }

        .output-area { 
            background:#000; 
            border-radius:15px; 
            padding:20px; 
            position: relative; 
            margin-bottom: 10px; 
            height: 350px; 
            overflow: auto; 
            border: 1px solid #1a1a1a;
        }

        pre { 
            color:#00ff44; 
            font-family:'Courier New', monospace; 
            font-size:14px; 
            margin:0; 
            white-space: pre; 
            user-select: text;
            line-height: 1.5;
        }

        .btn-copy {
            position: sticky;
            top: 0;
            float: right;
            background: #333;
            color: #fff; border: none; font-size: 10px; padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-weight: bold;
            text-transform: uppercase;
            z-index: 5;
        }

        table { width:100%; border-collapse:collapse; }
        th { text-align:left; font-size:11px; color:var(--text-gray); padding-bottom:20px; }
        .status-dot { height:12px; width:12px; border-radius:50%; display:inline-block; cursor: pointer; }
        .status-on { background:#00ff44; box-shadow:0 0 10px #00ff44; }
        .status-off { background:#ff0000; box-shadow:0 0 10px #ff0000; }

        .editable-item { cursor: pointer; border-bottom: 1px dashed #555; padding: 2px 4px; user-select: text; transition: 0.2s; }
        .editable-item:hover { color: var(--bright-red); border-bottom-color: var(--bright-red); }
        
        .btn-delete { background:none; border:none; color:#721c1c; font-weight:bold; cursor:pointer; font-size:10px; }

        #lockScreen { position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999; }
        #loginBox { background:#0d0606; padding:40px; border-radius:20px; text-align:center; border:1px solid #1a0d0d; position: relative; z-index: 5; }
        #statusLog { font-size: 11px; margin-top: 5px; color: #888; font-family: monospace; }
    </style>
</head>

<body oncontextmenu="openPapeletaModal('ADVERTENCIA', false, null, '', 'Acción no permitida'); return false;">

<div id="customModal">
    <div class="modal-content">
        <h2 id="mTitle">PAPELETA LICENCIA</h2>
        <p id="mMsg"></p>
        <input type="text" id="mInput" class="modal-input" style="display:none;">
        <div class="modal-btns">
            <button id="mCancel" class="btn-modal secondary" onclick="closePapeletaModal()">CANCELAR</button>
            <button class="btn-modal" onclick="confirmPapeletaModal()">ACEPTAR</button>
        </div>
    </div>
</div>

<div id="lockScreen">
    <div id="particles-js"></div>
    <div id="loginBox">
        <div class="brand-container" style="justify-content: center; margin-bottom: 30px;">
            <div class="logo-square">PL</div>
            <div class="brand-text" style="text-align: left;">
                <h2>ACCESO PANEL</h2>
                <p>NUEVA BASE DATOS</p>
            </div>
        </div>
        <input id="pinInput" type="password" maxlength="10" placeholder="PIN" style="padding:15px;font-size:20px;text-align:center;border-radius:10px;border:none; width: 120px; position: relative; z-index: 10;">
        <button class="btn-generate" style="margin-top:20px;" onclick="checkPIN()">ENTRAR</button>
        <p id="pinError" style="color:red;font-size:12px;margin-top:10px;"></p>
    </div>
</div>

<div class="wrapper">
    <header class="main-header">
        <div class="brand-container">
            <div class="logo-square">PL</div>
            <div class="brand-text">
                <h1>PAPELETA LICENCIA</h1>
                <p>ESTADO: <span id="dbStatus" style="color:var(--bright-red)">CONECTADO</span></p>
                <div style="display:flex; gap:5px;">
                    <button class="btn-action-small" onclick="toggleConfig()">⚙️ CONFIGURACIÓN</button>
                    <button class="btn-action-small" style="background: var(--bright-red); color: white;" onclick="showServerLua()">📄 SERVER.LUA</button>
                </div>
                
                <div id="configPanel" class="config-panel">
                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 10px; color: #aaa;">COLOR PARTÍCULAS:</label>
                        <input type="color" id="colorPicker" onchange="updateParticleColor(this.value)" style="cursor:pointer; background:none; border:none; width:20px; height:20px; vertical-align:middle;">
                    </div>
                    <div style="border-top: 1px solid #333; margin-top: 10px; padding-top: 10px;">
                        <label style="font-size: 10px; color: #aaa; display:block; margin-bottom:5px;">GESTIÓN:</label>
                        <button class="btn-action-small" style="width:100%; margin-bottom: 5px;" onclick="changePIN()">🔑 NUEVO PIN</button>
                        <button class="btn-action-small" style="width:100%;" onclick="clearSavedPin()">🔒 LOGOUT</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="stats">
            <div class="stat-card"><span>TOTAL</span><strong id="total-count">0</strong></div>
            <div class="stat-card"><span>ACTIVAS</span><strong id="active-count">0</strong></div>
        </div>
    </header>

    <div class="dashboard-grid">
        <aside>
            <div class="card">
                <h3>NUEVA LICENCIA</h3>
                <div class="input-group">
                    <label>NOMBRE DEL RECURSO</label>
                    <input type="text" id="resourceName" placeholder="sistema_ejemplo">
                </div>
                <div class="input-group">
                    <label>IP SERVIDOR</label>
                    <input type="text" id="ipAddr" placeholder="127.0.0.1">
                </div>
                <button class="btn-generate" onclick="addLicense()">ACTIVAR</button>
                <div id="statusLog">Listo para operar.</div>
            </div>
            <div class="card">
                <h3>VISTA CÓDIGO</h3>
                <div class="output-area" id="scrollArea">
                    <button class="btn-copy" onclick="copyText('luaCode')">COPIAR</button>
                    <pre id="luaCode">-- Selecciona una licencia</pre>
                </div>
            </div>
        </aside>

        <section>
            <div class="card">
                <table id="licenseTable">
                    <thead>
                        <tr>
                            <th>ACT</th>
                            <th>RECURSO</th>
                            <th>IP</th>
                            <th>USUARIO</th>
                            <th>KEY</th>
                            <th>ACC</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCHn1_svry9IiIUfbl_fah1OSAclauh794",
        authDomain: "licencia-papeleta.firebaseapp.com",
        projectId: "licencia-papeleta",
        storageBucket: "licencia-papeleta.firebasestorage.app",
        messagingSenderId: "249518444270",
        appId: "1:249518444270:web:3cd332f249be76e707edff",
        measurementId: "G-XS66VYKXKX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let PIN_MAESTRO = "1212";
    let modalAction = null;

    // AUTO-INSTALACIÓN: Crea la estructura si no existe
    async function initDatabase() {
        try {
            const configRef = doc(db, "configuracion", "ajustes");
            const snap = await getDoc(configRef);
            if (!snap.exists()) {
                await setDoc(configRef, { pin: "1212", color: "#ff1a1a" });
                console.log("Base de datos inicializada correctamente.");
            }
        } catch (e) { console.error("Error inicializando:", e); }
    }
    initDatabase();

    window.openPapeletaModal = (title, isPrompt = false, callback = null, defaultVal = "", customMsg = "") => {
        document.getElementById("mTitle").innerText = title;
        document.getElementById("mMsg").innerText = customMsg;
        const input = document.getElementById("mInput");
        input.style.display = isPrompt ? "block" : "none";
        input.value = defaultVal;
        document.getElementById("customModal").style.display = "flex";
        modalAction = callback;
    };

    window.confirmPapeletaModal = () => {
        const val = document.getElementById("mInput").value;
        document.getElementById("customModal").style.display = "none";
        if (modalAction) modalAction(val);
    };

    window.closePapeletaModal = () => document.getElementById("customModal").style.display = "none";

    onSnapshot(doc(db, "configuracion", "ajustes"), (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            if(data.pin) PIN_MAESTRO = data.pin;
            if(data.color) {
                initParticles(data.color);
                document.getElementById("colorPicker").value = data.color;
            }
        } else { initParticles("#ff1a1a"); }
    });

    window.checkPIN = () => {
        const pinIn = document.getElementById("pinInput").value;
        if(pinIn === PIN_MAESTRO){
            localStorage.setItem("papeleta_pin_activa", PIN_MAESTRO);
            document.getElementById("lockScreen").style.display = "none";
        } else { document.getElementById("pinError").innerText = "PIN INCORRECTO"; }
    };

    window.clearSavedPin = () => {
        localStorage.removeItem("papeleta_pin_activa");
        location.reload();
    };

    window.addLicense = async () => {
        const res = document.getElementById("resourceName").value.trim().toUpperCase();
        const ip = document.getElementById("ipAddr").value.trim();
        if(!res || !ip) return updateLog("FALTAN DATOS", true);

        const id = Date.now().toString();
        const newL = {
            id, resource: res, ip,
            user: "USR-" + Math.random().toString(36).substring(7).toUpperCase(),
            key: (Math.random().toString(36).substring(2) + Math.random().toString(36).substring(2)).toUpperCase(),
            active: true
        };

        try {
            await setDoc(doc(db, "licencias", id), newL);
            document.getElementById("resourceName").value = "";
            document.getElementById("ipAddr").value = "";
            updateLog("LICENCIA CREADA");
        } catch (e) { updateLog("ERROR AL GUARDAR", true); }
    };

    onSnapshot(collection(db, "licencias"), (snap) => {
        const tbody = document.querySelector("#licenseTable tbody");
        tbody.innerHTML = "";
        let t = 0; let a = 0;
        snap.forEach(d => {
            const l = d.data();
            t++; if(l.active) a++;
            const row = document.createElement("tr");
            row.style.cursor = "pointer";
            row.innerHTML = `
                <td><span class="status-dot ${l.active?'status-on':'status-off'}" onclick="event.stopPropagation(); toggleStatus('${l.id}', ${l.active})"></span></td>
                <td style="color:red;font-weight:900;">${l.resource}</td>
                <td><span class="editable-item" onclick="event.stopPropagation(); editField('${l.id}', 'ip', '${l.ip}')">${l.ip}</span></td>
                <td style="font-size:10px;">${l.user}</td>
                <td style="font-size:10px;">${l.key.substring(0,8)}...</td>
                <td><button class="btn-delete" onclick="event.stopPropagation(); deleteLicense('${l.id}')">X</button></td>
            `;
            row.onclick = () => showLua(l.user, l.key);
            tbody.prepend(row);
        });
        document.getElementById("total-count").innerText = t;
        document.getElementById("active-count").innerText = a;
    });

    window.toggleStatus = async (id, s) => await updateDoc(doc(db, "licencias", id), { active: !s });

    window.deleteLicense = (id) => {
        openPapeletaModal("BORRAR", false, async () => {
            await deleteDoc(doc(db, "licencias", id));
            updateLog("ELIMINADO");
        }, "", "¿Confirmas eliminar esta licencia?");
    };

    window.showServerLua = () => {
        const code = `-- API URL: licencia-papeleta
local urlBase = "https://firestore.googleapis.com/v1/projects/licencia-papeleta/databases/(default)/documents/licencias"

function iniciarValidacion()
    local resName = getResourceName(getThisResource())
    -- Aquí va el resto del código que ya conoces...
    outputDebugString("[LICENCIA] Conectado a: licencia-papeleta")
end`;
        document.getElementById("luaCode").innerText = code;
        updateLog("SERVER.LUA LISTO");
    };

    window.showLua = (u, k) => {
        document.getElementById("luaCode").innerText = `configLicense = {\n    ["User"] = "${u}",\n    ["Key"] = "${k}"\n}`;
    };

    window.updateLog = (m, e) => {
        const l = document.getElementById("statusLog");
        l.innerText = m; l.style.color = e ? "red" : "#00ff44";
    };

    function initParticles(c) {
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60 },
                "color": { "value": c },
                "line_linked": { "enable": true, "color": c },
                "move": { "enable": true, "speed": 1 }
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        if(localStorage.getItem("papeleta_pin_activa") === PIN_MAESTRO) {
            document.getElementById("lockScreen").style.display = "none";
        }
    });

    window.copyText = (id) => {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => updateLog("¡COPIADO!"));
    };
</script>
</body>
</html>
