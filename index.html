<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de ID Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg,#ff0080,#7928ca,#2afadf,#00ff88);
    background-size:400% 400%;
    animation: bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.box{
    background:#fff;
    width:350px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
    text-align:center;
}

h1,h2,h3{
    margin-bottom:15px;
    color:#7928ca;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#7928ca;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#ff0080;
    transform:scale(1.05);
}

.link{
    margin-top:15px;
    color:#0077cc;
    cursor:pointer;
    font-size:14px;
}

.error{
    color:red;
    margin-top:10px;
    display:none;
}

.hidden{
    display:none;
}

ul{
    list-style:none;
    padding:0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
    <h2>Iniciar Sesión</h2>
    <input id="loginUser" placeholder="Usuario">
    <input id="loginPass" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <p class="error" id="loginError">Datos incorrectos</p>
    <div class="link" onclick="showRegister()">¿No tienes cuenta? Regístrate</div>
</div>

<!-- REGISTRO -->
<div class="box hidden" id="registerBox">
    <h2>Registro</h2>
    <input id="regUser" placeholder="Nuevo usuario">
    <input id="regPass" type="password" placeholder="Nueva contraseña">
    <button onclick="register()">Crear cuenta</button>
    <p class="error" id="regError">Completa todos los campos</p>
    <div class="link" onclick="showLogin()">Ya tengo cuenta</div>
</div>

<!-- GENERADOR -->
<div class="box hidden" id="generatorBox">
    <h1>Generador de ID</h1>
    <button onclick="generateID()">Generar ID</button>
    <div id="generatedID" style="font-size:22px;margin:15px 0;font-weight:bold">---</div>
    <button onclick="copyID()">Copiar ID</button>
    <button onclick="logout()">Cerrar sesión</button>
</div>

<!-- PANEL ADMIN -->
<div class="box hidden" id="adminBox">
    <h1>Panel Admin</h1>

    <input id="aclUser" placeholder="Usuario a dar ACL">
    <button onclick="giveACL()">Dar ACL</button>

    <h3>Usuarios con ACL</h3>
    <ul id="aclList"></ul>

    <button onclick="logout()">Cerrar sesión</button>
</div>

<script>
// ADMIN FIJO
const ADMIN_USER = "Omar"
const ADMIN_PASS = "contraseña1234"

// SESIÓN
const session = localStorage.getItem("session")
if(session === "admin") showAdmin()
if(session === "user") showGenerator()

// PANTALLAS
function showRegister(){
    loginBox.classList.add("hidden")
    registerBox.classList.remove("hidden")
}

function showLogin(){
    registerBox.classList.add("hidden")
    loginBox.classList.remove("hidden")
}

function showGenerator(){
    loginBox.classList.add("hidden")
    registerBox.classList.add("hidden")
    adminBox.classList.add("hidden")
    generatorBox.classList.remove("hidden")
}

function showAdmin(){
    loginBox.classList.add("hidden")
    registerBox.classList.add("hidden")
    generatorBox.classList.add("hidden")
    adminBox.classList.remove("hidden")
    loadACLs()
}

// REGISTRO
function register(){
    const user = regUser.value.trim()
    const pass = regPass.value.trim()

    if(!user || !pass){
        regError.style.display="block"
        return
    }

    let users = JSON.parse(localStorage.getItem("users")) || {}

    if(users[user]){
        alert("Usuario ya existe ❌")
        return
    }

    users[user] = { pass: pass, acl: false }
    localStorage.setItem("users", JSON.stringify(users))

    alert("Cuenta creada ✅")
    showLogin()
}

// LOGIN
function login(){
    const user = loginUser.value.trim()
    const pass = loginPass.value.trim()

    if(user === ADMIN_USER && pass === ADMIN_PASS){
        localStorage.setItem("session","admin")
        showAdmin()
        return
    }

    let users = JSON.parse(localStorage.getItem("users")) || {}

    if(users[user] && users[user].pass === pass){
        localStorage.setItem("session","user")
        showGenerator()
    }else{
        loginError.style.display="block"
    }
}

// LOGOUT
function logout(){
    localStorage.clear()
    location.reload()
}

// ACL
function giveACL(){
    const user = aclUser.value.trim()
    let users = JSON.parse(localStorage.getItem("users")) || {}

    if(!users[user]){
        alert("Usuario no existe ❌")
        return
    }

    users[user].acl = true
    localStorage.setItem("users", JSON.stringify(users))
    alert("ACL dada a " + user)
    loadACLs()
}

function loadACLs(){
    aclList.innerHTML=""
    let users = JSON.parse(localStorage.getItem("users")) || {}

    for(let u in users){
        if(users[u].acl){
            let li = document.createElement("li")
            li.textContent = u
            aclList.appendChild(li)
        }
    }
}

// GENERADOR ID
function generateID(){
    const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"
    let id=""
    for(let i=0;i<8;i++){
        id+=chars[Math.floor(Math.random()*chars.length)]
    }
    generatedID.textContent=id
}

function copyID(){
    if(generatedID.textContent==="---"){
        alert("Genera un ID primero")
        return
    }
    navigator.clipboard.writeText(generatedID.textContent)
    alert("ID copiado ✔")
}
</script>

</body>
</html>
