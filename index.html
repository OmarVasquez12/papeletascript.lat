<!DOCTYPE html>
<html lang="es">
<head> 
    <link rel="icon" href="data:," />
    <meta charset="UTF-8">
    <title>Fenix Elite Pvp - Panel Oficial</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *{box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{margin:0;height:100vh;background:#0b0d12;color:white;transition:0.3s; overflow-x: hidden;}
        
        /* Fondo Animado */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #1c1f26, #0b0d12, #203040, #111);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; z-index: -1;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Tarjetas de Login/Register */
        .card{width:380px;background:#111;padding:30px;border-radius:18px;margin:120px auto;transition:0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #222;}
        .logo{text-align:center;font-size:32px;font-weight:700;margin-bottom:20px;}
        .logo span{color:rgb(255, 159, 28);}
        
        input, button, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; outline: none; }
        input, select { background: #1c1f26; color: white; border: 1px solid #333; }
        button { background: linear-gradient(135deg, rgb(255, 159, 28), #ff7a18); font-weight: 700; cursor: pointer; color: #111; }
        button:hover { transform: scale(1.02); opacity: 0.9; }

        .switch { text-align: center; font-size: 13px; color: #aaa; cursor: pointer; margin-top: 10px; }
        .switch:hover { color: #ff9f1c; }
        .msg { text-align: center; font-size: 13px; margin-top: 10px; font-weight: 600; }

        /* Panel Principal */
        #main { display: none; padding: 30px; }
        .top-bar { position: fixed; top: 20px; right: 25px; display: flex; gap: 10px; align-items: center; z-index: 100; }
        .userLabel { background: rgba(255, 159, 28, 0.1); color: #ff9f1c; padding: 8px 15px; border-radius: 30px; border: 1px solid #ff9f1c; font-weight: 600; }
        .btn-action { cursor: pointer; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 12px; border: none; }
        .btn-config { background: #ff9f1c; color: #111; }
        .btn-logout { background: #ff4b2b; color: white; }

        /* Menú Config Lateral */
        .config {
            position: fixed; top: 0; right: -360px; width: 340px; height: 100%;
            background: #111; padding: 25px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 1000; border-left: 3px solid #ff9f1c; overflow-y: auto;
        }
        .config.open { right: 0; }
        .section { margin-bottom: 25px; }
        .section h3 { color: #ff9f1c; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px;}

        /* Panel de Usuarios */
        #userPanel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; max-height: 500px; background: #161920; padding: 20px;
            border-radius: 15px; border: 1px solid #ff9f1c; z-index: 2000; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .userRow { 
            background: #111; padding: 12px; border-radius: 10px; margin-bottom: 8px; 
            display: flex; justify-content: space-between; align-items: center; font-size: 13px;
        }
        .userRow b { color: #ff9f1c; }

        /* Notificaciones */
        .notify {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #ff9f1c; color: #111; padding: 15px 30px; border-radius: 10px;
            font-weight: 700; transition: 0.5s; z-index: 9999; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .notify.show { top: 30px; }
    </style>
</head>
<body>

<div class="notify" id="notifyBox"></div>

<div class="card" id="loginBox">
    <div class="logo">Fenix <span>Elite</span></div>
    <input id="lUser" placeholder="Usuario">
    <input id="lPass" type="password" placeholder="Contraseña">
    <label style="display:flex; align-items:center; font-size:12px; margin: 5px 0;">
        <input type="checkbox" id="rememberCheck" style="width:auto; margin-right:8px;"> Recordar mi sesión
    </label>
    <button onclick="login()">ENTRAR AL PANEL</button>
    <div class="switch" onclick="showRegister()">¿No tienes cuenta? Regístrate aquí</div>
    <div class="msg" id="msg"></div>
</div>

<div class="card" id="registerBox" style="display:none">
    <div class="logo">Nueva <span>Cuenta</span></div>
    <input id="rUser" placeholder="Crea un usuario">
    <input id="rPass" type="password" placeholder="Crea una contraseña">
    <input id="rPass2" type="password" placeholder="Repite la contraseña">
    <button onclick="register()">REGISTRARMEHORA</button>
    <div class="switch" onclick="showLogin()">Ya tengo cuenta, volver al login</div>
    <div class="msg" id="rmsg"></div>
</div>

<div id="main">
    <div class="top-bar">
        <div class="userLabel" id="userLabel">Invitado</div>
        <button class="btn-action btn-config" id="configBtn" onclick="toggleConfig()" style="display:none">CONFIG</button>
        <button class="btn-action btn-logout" onclick="logout()">SALIR</button>
    </div>

    <div style="text-align:center; margin-top:150px;">
        <h1 style="font-size: 40px;">BIENVENIDO A <span style="color:#ff9f1c">FENIX ELITE</span></h1>
        <p style="color:#aaa;">Has ingresado satisfactoriamente al panel de control.</p>
    </div>
</div>

<div class="config" id="config">
    <div class="section">
        <button onclick="toggleConfig()" style="background:#333; color:white;">← VOLVER AL PANEL</button>
    </div>

    <div class="section" id="sectionUsers">
        <h3>Administración de Usuarios</h3>
        <button onclick="toggleUserPanel()">LISTA DE JUGADORES</button>
    </div>

    <div class="section" id="sectionACL">
        <h3>Gestión de Roles (ACL)</h3>
        <input id="aclUserID" placeholder="ID del Jugador">
        <select id="aclRole">
            <option value="user">USER (Jugador)</option>
            <option value="mod">MOD (Moderador)</option>
            <option value="admin">ADMIN (Dueño)</option>
        </select>
        <button onclick="setACL()">APLICAR RANGO</button>
        <div class="msg" id="aclMsg"></div>
    </div>

    <div class="section">
        <h3>Zona de Peligro</h3>
        <button onclick="borrarTodo()" style="background:#ff4b2b; color:white;">FORMATEAR BASE DE DATOS</button>
    </div>
</div>

<div id="userPanel">
    <h3 style="margin:0 0 15px 0; color:#ff9f1c;">Jugadores Registrados</h3>
    <input type="text" id="searchUser" placeholder="Buscar por nombre..." oninput="loadUsers()">
    <div id="userList" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
    <button onclick="toggleUserPanel()" style="background:#444; color:white;">CERRAR LISTA</button>
</div>

<script>
// --- CONFIGURACIÓN INICIAL ---
let currentUser = null;
let currentRole = null;
let currentUserID = null;

// Inicializar ID global si no existe
if(!localStorage.getItem("fx_last_id")) localStorage.setItem("fx_last_id", "1");

// Crear Admin Omar si la base de datos está vacía
if(!localStorage.getItem("fx_Omar")) {
    localStorage.setItem("fx_Omar", JSON.stringify({pass:"1234", role:"admin", id:1}));
}

// Auto-login si se marcó "Recordar"
window.onload = function() {
    const session = JSON.parse(localStorage.getItem("fx_active_session") || "null");
    if(session) autoLogin(session.user, session.pass);
};

// --- FUNCIONES DE NAVEGACIÓN ---
function showNotify(text){
    const box = document.getElementById('notifyBox');
    box.innerText = text;
    box.classList.add('show');
    setTimeout(()=> box.classList.remove('show'), 3000);
}

function showRegister(){ 
    document.getElementById("loginBox").style.display="none"; 
    document.getElementById("registerBox").style.display="block"; 
}

function showLogin(){ 
    document.getElementById("registerBox").style.display="none"; 
    document.getElementById("loginBox").style.display="block"; 
}

function toggleConfig() {
    document.getElementById("config").classList.toggle("open");
    document.getElementById("sectionACL").style.display = (currentRole === "admin") ? "block" : "none";
}

function toggleUserPanel() {
    const p = document.getElementById("userPanel");
    const visible = p.style.display === "block";
    p.style.display = visible ? "none" : "block";
    if(!visible) loadUsers();
}

// --- LÓGICA DE USUARIOS ---

function login() {
    const u = document.getElementById("lUser").value.trim();
    const p = document.getElementById("lPass").value;
    const remember = document.getElementById("rememberCheck").checked;
    
    const data = JSON.parse(localStorage.getItem("fx_" + u) || "null");
    
    if(!data || data.pass !== p) {
        const m = document.getElementById("msg");
        m.innerText = "Usuario o clave incorrectos";
        m.style.color = "#ff4b2b";
        return;
    }

    if(remember) localStorage.setItem("fx_active_session", JSON.stringify({user:u, pass:p}));
    entrarAlPanel(u, data);
}

function autoLogin(u, p) {
    const data = JSON.parse(localStorage.getItem("fx_" + u) || "null");
    if(data && data.pass === p) entrarAlPanel(u, data);
}

function entrarAlPanel(u, data) {
    currentUser = u;
    currentRole = data.role;
    currentUserID = data.id;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("registerBox").style.display="none";
    document.getElementById("main").style.display="block";
    
    document.getElementById("userLabel").innerText = `${u} (ID: ${currentUserID})`;

    if(currentRole === "admin" || currentRole === "mod") {
        document.getElementById("configBtn").style.display = "block";
    }
    showNotify("¡Hola de nuevo, " + u + "!");
}

function logout() {
    localStorage.removeItem("fx_active_session");
    location.reload();
}

function register() {
    const u = document.getElementById("rUser").value.trim();
    const p = document.getElementById("rPass").value;
    const p2 = document.getElementById("rPass2").value;

    if(!u || !p || p !== p2) {
        document.getElementById("rmsg").innerText = "Revisa los campos y contraseñas";
        document.getElementById("rmsg").style.color = "#ff4b2b";
        return;
    }

    if(localStorage.getItem("fx_" + u)) {
        document.getElementById("rmsg").innerText = "Ese nombre ya está en uso";
        return;
    }

    // ARREGLO DE ID: Obtener último, sumar y guardar
    let lastId = parseInt(localStorage.getItem("fx_last_id"));
    let newId = lastId + 1;
    localStorage.setItem("fx_last_id", newId.toString());
    
    const userData = { pass: p, role: "user", id: newId };
    localStorage.setItem("fx_" + u, JSON.stringify(userData));

    showNotify("¡Cuenta registrada! Tu ID es: " + newId);
    setTimeout(showLogin, 1500);
}

// --- ADMINISTRACIÓN ---

function loadUsers() {
    const list = document.getElementById("userList");
    const search = document.getElementById("searchUser").value.toLowerCase();
    list.innerHTML = "";

    // Claves del sistema que NO debemos mostrar como usuarios
    const systemKeys = ["fx_last_id", "fx_active_session", "fx_log", "fx_saved_login"];

    Object.keys(localStorage).forEach(key => {
        if(key.startsWith("fx_") && !systemKeys.includes(key)) {
            const name = key.replace("fx_", "");
            const data = JSON.parse(localStorage.getItem(key));
            
            // Solo mostrar si el dato es válido y tiene un ID
            if(data && data.id && name.toLowerCase().includes(search)) {
                const row = document.createElement("div");
                row.className = "userRow";
                row.innerHTML = `
                    <div><b>${name}</b> <br> <small>ID: ${data.id} | Rol: ${data.role}</small></div>
                    <button onclick="copyId('${data.id}')" style="width:auto; padding:5px 10px; font-size:10px;">COPIAR ID</button>
                `;
                list.appendChild(row);
            }
        }
    });
}

function copyId(id) {
    navigator.clipboard.writeText(id);
    showNotify("ID " + id + " copiado al portapapeles");
}

function setACL() {
    const id = document.getElementById("aclUserID").value;
    const newRole = document.getElementById("aclRole").value;
    const msg = document.getElementById("aclMsg");
    let found = false;

    Object.keys(localStorage).forEach(key => {
        if(key.startsWith("fx_")) {
            try {
                let data = JSON.parse(localStorage.getItem(key));
                if(data && data.id == id) {
                    data.role = newRole;
                    localStorage.setItem(key, JSON.stringify(data));
                    found = true;
                }
            } catch(e) {}
        }
    });

    if(found) {
        msg.innerText = "Rango actualizado con éxito";
        msg.style.color = "lightgreen";
        loadUsers();
    } else {
        msg.innerText = "ID no encontrado en el sistema";
        msg.style.color = "#ff4b2b";
    }
}

function borrarTodo() {
    if(confirm("¡ATENCIÓN! Se borrarán todos los jugadores y datos. ¿Continuar?")) {
        localStorage.clear();
        location.reload();
    }
}
</script>

</body>
</html>
