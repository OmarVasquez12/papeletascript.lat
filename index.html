<!DOCTYPE html>
<html lang="es">
<head> 
    <link rel="icon" href="data:," />
    <meta charset="UTF-8">
    <title>Fenix Elite Pvp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *{box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{margin:0;height:100vh;background:#0b0d12;color:white;transition:0.3s; overflow-x: hidden;}
        .card{width:380px;background:#111;padding:30px;border-radius:18px;margin:120px auto;transition:0.3s; position: relative; z-index: 10;}
        .logo{text-align:center;font-size:32px;font-weight:700;margin-bottom:20px;transition:0.3s;}
        .logo span{color:rgb(255, 159, 28);}
        input,button,select{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;transition:0.3s;}
        input,select{background:#1c1f26;color:white;}
        button{background:linear-gradient(135deg,rgb(255, 159, 28),#ff7a18);font-weight:600;cursor:pointer;transition:0.3s; color: #111;}
        button:hover{transform:scale(1.05);}
        .switch{text-align:center;font-size:13px;color:#aaa;cursor:pointer;transition:0.3s;}
        .switch:hover{color:#ff9f1c;}
        .msg{text-align:center;font-size:13px;margin-top:10px;transition:0.3s;}
        
        /* Dashboard Principal */
        #main{display:none;padding:30px;}
        .top-bar { position: fixed; top: 20px; right: 25px; display: flex; gap: 15px; align-items: center; z-index: 100; }
        .userLabel{ font-weight:600; color:#ff9f1c; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; }
        .configBtn, .logoutBtn { cursor:pointer; font-weight: bold; padding: 5px 12px; border-radius: 8px; }
        .configBtn { background: #ff9f1c; color: #111; }
        .logoutBtn { background: #ff4b2b; color: white; }

        .config {
            position: fixed; top: 0; right: -360px; width: 340px; height: 100%;
            background: #111; padding: 20px; transition: 0.3s; overflow-y: auto;
            z-index: 1000; border-left: 2px solid #ff9f1c;
        }
        .config.open{right:0;}
        .section{margin-bottom:20px; border-bottom: 1px solid #222; padding-bottom: 10px;}
        .section h3{margin:0 0 10px;color:#ff9f1c; font-size: 14px;}
        
        .userRow{ background:#1c1f26; padding:10px; border-radius:8px; margin-bottom:8px; font-size:12px; display: flex; justify-content: space-between; align-items: center;}
        
        /* PANEL CENTRAL DE USUARIOS */
        #userPanel{
            display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 450px; max-height: 70vh; overflow-y: auto;
            background:#111; padding:20px; border-radius:12px; border: 1px solid #ff9f1c; z-index:2000;
        }

        .notify{
            position:fixed; top:-100px; left:50%; transform:translateX(-50%);
            background:#ff9f1c; color:#111; padding:15px 25px; border-radius:8px;
            font-weight:600; transition:0.5s; opacity:0; z-index:9999;
        }
        .notify.show{ top:20px; opacity:1; }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #1c1f26, #0b0d12, #203040);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; z-index: -1;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>

<body>

<div class="notify" id="notifyBox"></div>

<div class="card" id="loginBox">
    <div class="logo">Fenix <span>Elite</span></div>
    <input id="lUser" placeholder="Usuario">
    <input id="lPass" type="password" placeholder="Contraseña">
    <label style="display:flex;align-items:center;font-size:13px;margin-top:5px;">
        <input type="checkbox" id="rememberCheck" style="width:auto; margin-right:5px;"> Recordar sesión
    </label>
    <button onclick="login()">Iniciar sesión</button>
    <div class="switch" onclick="showRegister()">¿No tienes cuenta? Regístrate</div>
    <div class="msg" id="msg"></div>
</div>

<div class="card" id="registerBox" style="display:none">
    <div class="logo">Registrar <span>Cuenta</span></div>
    <input id="rUser" placeholder="Usuario Nuevo">
    <input id="rPass" type="password" placeholder="Contraseña">
    <input id="rPass2" type="password" placeholder="Confirmar Contraseña">
    <button onclick="register()">Registrar</button>
    <div class="switch" onclick="showLogin()">Volver al Login</div>
    <div class="msg" id="rmsg"></div>
</div>

<div id="main">
    <div class="top-bar">
        <div class="userLabel" id="userLabel">Invitado</div>
        <div class="configBtn" id="configBtn" onclick="toggleConfig()" style="display:none">CONFIG</div>
        <div class="logoutBtn" onclick="logout()">SALIR</div>
    </div>
    
    <div style="text-align: center; margin-top: 200px;">
        <h1>Bienvenido a Fenix Elite</h1>
        <p>Has iniciado sesión correctamente.</p>
    </div>
</div>

<div class="config" id="config">
    <div class="section">
        <button onclick="closeConfig()" style="background:#eee;">Cerrar Menú</button>
    </div>

    <div class="section" id="sectionUsers">
        <h3>ADMINISTRACIÓN DE USUARIOS</h3>
        <button onclick="toggleUserPanel()">VER LISTA DE USUARIOS</button>
    </div>

    <div class="section" id="sectionACL">
        <h3>GESTIÓN ACL (ROLES)</h3>
        <input id="aclUserID" placeholder="ID del usuario">
        <select id="aclRole">
            <option value="user">User</option>
            <option value="mod">Mod</option>
            <option value="admin">Admin</option>
        </select>
        <button onclick="setACL()">Cambiar Rol</button>
        <div class="msg" id="aclMsg"></div>
    </div>

    <div class="section">
        <h3>SISTEMA</h3>
        <button onclick="borrarTodo()" style="background:#ff4b2b;color:white;">Borrar Base de Datos</button>
    </div>
</div>

<div id="userPanel">
    <h3 style="color:#ff9f1c">Usuarios Registrados</h3>
    <input type="text" id="searchUser" placeholder="Buscar por nombre..." oninput="loadUsers()">
    <div id="userList"></div>
    <button onclick="toggleUserPanel()" style="margin-top:10px; background:#444; color:white;">Cerrar</button>
</div>

<script>
// Variables Globales de Estado
let currentUser = null;
let currentRole = null;
let currentUserID = null;

// Inicializar Admin por defecto
if(!localStorage.getItem("fx_Omar")) {
    localStorage.setItem("fx_Omar", JSON.stringify({pass:"1234", role:"admin", id:1}));
}

// Cargar sesión si existe "Recordar"
window.onload = function() {
    const saved = JSON.parse(localStorage.getItem("fx_active_session") || "null");
    if(saved) {
        autoLogin(saved.user, saved.pass);
    }
};

function showNotify(text){
    const notify = document.getElementById('notifyBox');
    notify.innerText = text;
    notify.classList.add('show');
    setTimeout(()=>{ notify.classList.remove('show'); }, 3000);
}

function showRegister(){ 
    document.getElementById("loginBox").style.display="none"; 
    document.getElementById("registerBox").style.display="block"; 
}
function showLogin(){ 
    document.getElementById("registerBox").style.display="none"; 
    document.getElementById("loginBox").style.display="block"; 
}

function login() {
    const u = document.getElementById("lUser").value.trim();
    const p = document.getElementById("lPass").value;
    const remember = document.getElementById("rememberCheck").checked;
    
    const data = JSON.parse(localStorage.getItem("fx_" + u) || "null");
    
    if(!data || data.pass !== p) {
        document.getElementById("msg").innerText = "Usuario o contraseña incorrectos";
        document.getElementById("msg").style.color = "red";
        return;
    }

    if(remember) {
        localStorage.setItem("fx_active_session", JSON.stringify({user:u, pass:p}));
    }

    entrarAlPanel(u, data);
}

function autoLogin(u, p) {
    const data = JSON.parse(localStorage.getItem("fx_" + u) || "null");
    if(data && data.pass === p) entrarAlPanel(u, data);
}

function entrarAlPanel(u, data) {
    currentUser = u;
    currentRole = data.role;
    currentUserID = data.id;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("registerBox").style.display="none";
    document.getElementById("main").style.display="block";
    
    document.getElementById("userLabel").innerText = `${u} (ID: ${currentUserID}) [${currentRole.toUpperCase()}]`;

    // Solo admin y mod ven el botón de configuración
    if(currentRole === "admin" || currentRole === "mod") {
        document.getElementById("configBtn").style.display = "block";
    } else {
        document.getElementById("configBtn").style.display = "none";
    }
    
    showNotify("¡Bienvenido " + u + "!");
}

function logout() {
    localStorage.removeItem("fx_active_session");
    location.reload();
}

function register() {
    const u = document.getElementById("rUser").value.trim();
    const p = document.getElementById("rPass").value;
    const p2 = document.getElementById("rPass2").value;

    if(!u || !p || p !== p2) {
        document.getElementById("rmsg").innerText = "Las contraseñas no coinciden o faltan datos";
        return;
    }

    if(localStorage.getItem("fx_" + u)) {
        document.getElementById("rmsg").innerText = "El usuario ya existe";
        return;
    }

    let lastId = parseInt(localStorage.getItem("fx_last_id") || "1");
    lastId++;
    localStorage.setItem("fx_last_id", lastId);
    
    const newUser = { pass: p, role: "user", id: lastId };
    localStorage.setItem("fx_" + u, JSON.stringify(newUser));

    showNotify("Cuenta creada con éxito. ID: " + lastId);
    setTimeout(showLogin, 1500);
}

function toggleConfig() {
    document.getElementById("config").classList.toggle("open");
    // Ocultar secciones si es MOD
    document.getElementById("sectionACL").style.display = (currentRole === "admin") ? "block" : "none";
}

function closeConfig() { document.getElementById("config").classList.remove("open"); }

function toggleUserPanel() {
    const panel = document.getElementById("userPanel");
    const isVisible = panel.style.display === "block";
    panel.style.display = isVisible ? "none" : "block";
    if(!isVisible) loadUsers();
}

function loadUsers() {
    const listDiv = document.getElementById("userList");
    const search = document.getElementById("searchUser").value.toLowerCase();
    listDiv.innerHTML = "";

    Object.keys(localStorage).forEach(key => {
        if(key.startsWith("fx_") && key !== "fx_last_id" && key !== "fx_active_session") {
            const name = key.replace("fx_", "");
            const data = JSON.parse(localStorage.getItem(key));
            
            if(name.toLowerCase().includes(search)) {
                const row = document.createElement("div");
                row.className = "userRow";
                row.innerHTML = `
                    <span><b>${name}</b> (ID: ${data.id}) - ${data.role}</span>
                    <button onclick="copyToClipboard('${data.id}')" style="width:auto; padding:5px; font-size:10px;">ID</button>
                `;
                listDiv.appendChild(row);
            }
        }
    });
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
    showNotify("ID " + text + " copiado");
}

function setACL() {
    const id = document.getElementById("aclUserID").value;
    const newRole = document.getElementById("aclRole").value;
    let found = false;

    Object.keys(localStorage).forEach(key => {
        if(key.startsWith("fx_")) {
            let data = JSON.parse(localStorage.getItem(key));
            if(data.id == id) {
                data.role = newRole;
                localStorage.setItem(key, JSON.stringify(data));
                found = true;
            }
        }
    });

    if(found) {
        showNotify("Rol actualizado correctamente");
        loadUsers();
    } else {
        alert("ID no encontrado");
    }
}

function borrarTodo() {
    if(confirm("¿Estás seguro de borrar TODOS los usuarios? Esto reiniciará la página.")) {
        Object.keys(localStorage).forEach(key => {
            if(key.startsWith("fx_")) localStorage.removeItem(key);
        });
        location.reload();
    }
}
</script>

</body>
</html>
