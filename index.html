<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <title>Fenix Elite Pvp - Base de Datos Real</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *{box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{margin:0;height:100vh;background:#0b0d12;color:white;transition:0.3s; overflow-x: hidden;}
        
        /* Fondo Animado */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #1c1f26, #0b0d12, #203040);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; z-index: -1;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .card{width:380px;background:#111;padding:30px;border-radius:18px;margin:120px auto; transition:0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #222;}
        .logo{text-align:center;font-size:32px;font-weight:700;margin-bottom:20px;}
        .logo span{color:rgb(255, 159, 28);}
        
        input, button, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; outline: none; }
        input, select { background: #1c1f26; color: white; border: 1px solid #333; }
        button { background: linear-gradient(135deg, rgb(255, 159, 28), #ff7a18); font-weight: 700; cursor: pointer; color: #111; }
        button:hover { transform: scale(1.02); }

        .switch { text-align: center; font-size: 13px; color: #aaa; cursor: pointer; margin-top: 10px; }
        .switch:hover { color: #ff9f1c; }
        
        /* Panel Principal */
        #main { display: none; padding: 20px; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 15px 25px; border-radius: 50px; margin-top: 10px; border: 1px solid #333;}
        .user-info { color: #ff9f1c; font-weight: 600; }
        
        /* Contenedor de Usuarios (Visible para todos) */
        .user-section { max-width: 600px; margin: 40px auto; background: rgba(17,17,17,0.9); padding: 20px; border-radius: 15px; border: 1px solid #ff9f1c; }
        .user-list { max-height: 300px; overflow-y: auto; margin-top: 15px; }
        .user-row { background: #1c1f26; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #ff9f1c; }
        
        /* Panel Config (Solo Admin) */
        .config-side { position: fixed; top: 0; right: -360px; width: 340px; height: 100%; background: #111; padding: 25px; transition: 0.4s; z-index: 1000; border-left: 2px solid #ff9f1c; }
        .config-side.open { right: 0; }

        .notify { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #ff9f1c; color: #111; padding: 15px 30px; border-radius: 10px; font-weight: 700; transition: 0.5s; z-index: 9999; }
        .notify.show { top: 30px; }
    </style>
</head>
<body>

<div class="notify" id="notifyBox"></div>

<div class="card" id="loginBox">
    <div class="logo">Fenix <span>Elite</span></div>
    <input id="lUser" placeholder="Tu Usuario">
    <input id="lPass" type="password" placeholder="Tu Contraseña">
    <button onclick="login()">INICIAR SESIÓN</button>
    <div class="switch" onclick="showRegister()">¿Eres nuevo? Regístrate aquí</div>
    <div id="msg" style="text-align:center; margin-top:10px; color:red;"></div>
</div>

<div class="card" id="registerBox" style="display:none">
    <div class="logo">Nuevo <span>Registro</span></div>
    <input id="rUser" placeholder="Crea un Usuario">
    <input id="rPass" type="password" placeholder="Crea una Contraseña">
    <input id="rPass2" type="password" placeholder="Repite la Contraseña">
    <button onclick="register()">CREAR CUENTA</button>
    <div class="switch" onclick="showLogin()">Ya tengo cuenta, volver</div>
    <div id="rmsg" style="text-align:center; margin-top:10px;"></div>
</div>

<div id="main">
    <div class="top-nav">
        <div class="user-info" id="userDisplay"></div>
        <div style="display:flex; gap:10px;">
            <button id="adminBtn" onclick="openConfig()" style="display:none; padding:5px 15px; font-size:12px; width:auto;">CONFIG ADMIN</button>
            <button onclick="logout()" style="background:red; color:white; padding:5px 15px; font-size:12px; width:auto;">SALIR</button>
        </div>
    </div>

    <div class="user-section">
        <h3 style="margin:0; text-align:center; color:#ff9f1c;">USUARIOS EN LÍNEA / REGISTRADOS</h3>
        <p style="font-size:11px; text-align:center; color:#888;">Aquí puedes ver a todos los que han creado su cuenta</p>
        <div class="user-list" id="globalUserList">
            </div>
    </div>
</div>

<div class="config-side" id="configSide">
    <button onclick="closeConfig()" style="background:#333; color:white;">CERRAR X</button>
    <h3 style="color:#ff9f1c; border-bottom:1px solid #333; margin-top:20px;">CONTROL TOTAL</h3>
    <button onclick="borrarTodo()" style="background:red; color:white;">BORRAR TODA LA DB</button>
    
    <h3 style="color:#ff9f1c; border-bottom:1px solid #333; margin-top:20px;">CAMBIAR RANGO</h3>
    <input id="targetID" placeholder="ID del Jugador">
    <select id="newRole">
        <option value="user">User</option>
        <option value="mod">Mod</option>
        <option value="admin">Admin</option>
    </select>
    <button onclick="updateRole()">CAMBIAR RANGO</button>
</div>

<script>
// --- LÓGICA DE BASE DE DATOS LOCAL ---
let session = null;

// Inicialización de IDs
if(!localStorage.getItem("fx_id_count")) localStorage.setItem("fx_id_count", "0");

// Crear admin inicial
if(!localStorage.getItem("fx_Omar")) {
    localStorage.setItem("fx_Omar", JSON.stringify({pass:"1234", role:"admin", id:1}));
    localStorage.setItem("fx_id_count", "1");
}

function showNotify(text){
    const n = document.getElementById('notifyBox');
    n.innerText = text; n.classList.add('show');
    setTimeout(()=> n.classList.remove('show'), 3000);
}

function showRegister(){ loginBox.style.display="none"; registerBox.style.display="block"; }
function showLogin(){ registerBox.style.display="none"; loginBox.style.display="block"; }

// REGISTRO CON ID AUTO-INCREMENTABLE
function register() {
    const u = document.getElementById("rUser").value.trim();
    const p = document.getElementById("rPass").value;
    const p2 = document.getElementById("rPass2").value;

    if(!u || !p || p !== p2) { rmsg.innerText="Datos incorrectos"; return; }
    if(localStorage.getItem("fx_"+u)) { rmsg.innerText="Usuario ya existe"; return; }

    // Incrementar ID
    let count = parseInt(localStorage.getItem("fx_id_count"));
    let nextId = count + 1;
    
    localStorage.setItem("fx_"+u, JSON.stringify({pass:p, role:"user", id:nextId}));
    localStorage.setItem("fx_id_count", nextId.toString());

    rmsg.style.color="lightgreen";
    rmsg.innerText="¡Registrado! Eres el ID: " + nextId;
    setTimeout(showLogin, 1500);
}

// LOGIN
function login() {
    const u = document.getElementById("lUser").value.trim();
    const p = document.getElementById("lPass").value;
    const data = JSON.parse(localStorage.getItem("fx_"+u) || "null");

    if(!data || data.pass !== p) {
        msg.innerText = "Usuario o clave incorrecta";
        return;
    }

    session = {user: u, role: data.role, id: data.id};
    enterPanel();
}

function enterPanel() {
    loginBox.style.display="none";
    registerBox.style.display="none";
    main.style.display="block";
    
    document.getElementById("userDisplay").innerText = "Bienvenido: " + session.user + " (ID: " + session.id + ")";
    
    if(session.role === "admin") adminBtn.style.display = "block";
    
    showNotify("Sesión Iniciada");
    refreshGlobalList();
}

// CARGAR TODOS LOS USUARIOS (Visible para todos)
function refreshGlobalList() {
    const list = document.getElementById("globalUserList");
    list.innerHTML = "";

    // Buscamos todas las cuentas en LocalStorage
    Object.keys(localStorage).forEach(key => {
        if(key.startsWith("fx_") && key !== "fx_id_count") {
            const name = key.replace("fx_", "");
            const data = JSON.parse(localStorage.getItem(key));
            
            const div = document.createElement("div");
            div.className = "userRow";
            div.innerHTML = `
                <span><b>${name}</b> (ID: ${data.id})</span>
                <span style="color:#ff9f1c; font-size:11px;">RANGO: ${data.role.toUpperCase()}</span>
            `;
            list.appendChild(div);
        }
    });
}

function openConfig() { configSide.classList.add("open"); }
function closeConfig() { configSide.classList.remove("open"); }

function updateRole() {
    const id = document.getElementById("targetID").value;
    const role = document.getElementById("newRole").value;
    let found = false;

    Object.keys(localStorage).forEach(key => {
        if(key.startsWith("fx_")) {
            let data = JSON.parse(localStorage.getItem(key));
            if(data.id == id) {
                data.role = role;
                localStorage.setItem(key, JSON.stringify(data));
                found = true;
            }
        }
    });

    if(found) {
        showNotify("Rango actualizado");
        refreshGlobalList();
    } else {
        alert("ID no encontrado");
    }
}

function borrarTodo() {
    if(confirm("¡CUIDADO! Se borrarán todos los jugadores y el ID volverá a 1. ¿Estás seguro?")) {
        localStorage.clear();
        location.reload();
    }
}

function logout() {
    location.reload();
}
</script>
</body>
</html>
