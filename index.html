<!DOCTYPE html>
<html lang="es">
<head> 
<link rel="icon" href="data:," />
<meta charset="UTF-8">
<title>Fenix Elite Pvp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{margin:0;height:100vh;background:#0b0d12;color:white;transition:0.3s;}
.card{width:380px;background:#111;padding:30px;border-radius:18px;margin:120px auto;transition:0.3s;}
.logo{text-align:center;font-size:32px;font-weight:700;margin-bottom:20px;transition:0.3s;}
.logo span{color:rgb(255, 159, 28);}
input,button,select{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;transition:0.3s;}
input,select{background:#1c1f26;color:white;}
button{background:linear-gradient(135deg,rgb(255, 159, 28),#ff7a18);font-weight:600;cursor:pointer;transition:0.3s;}
button:hover{transform:scale(1.05);}
.switch{text-align:center;font-size:13px;color:#aaa;cursor:pointer;transition:0.3s;}
.switch:hover{color:#ff9f1c;}
.msg{text-align:center;font-size:13px;margin-top:10px;transition:0.3s;}
#main{display:none;padding:30px;}
.configBtn{position:fixed;top:20px;right:25px;font-weight:600;cursor:pointer;color:#ff9f1c;}
.userLabel{position:fixed;top:20px;right:150px;font-weight:600;color:#ff9f1c;}
.config {
    position: fixed;
    top: 0;
    right: -360px;
    width: 340px;
    height: 100%;
    background: #111;
    padding: 20px;
    transition: 0.3s;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 12px;
}
.config::-webkit-scrollbar { width: 12px; }
.config::-webkit-scrollbar-track { background: #1c1f26; border-radius: 12px; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }
.config::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #ff9f1c, #ff7a18); border-radius: 12px; border: 3px solid #111; transition: all 0.3s ease; }
.config::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #ffd26b, #ff4f00); transform: scaleX(1.2); }
.config { scrollbar-width: thin; scrollbar-color: #ff9f1c #1c1f26; }
.config.open{right:0;}
.section{margin-bottom:20px;}
.section h3{margin:0 0 10px;color:#ff9f1c;}
.userRow{
    background:#111;
    padding:10px;
    border-radius:8px;
    margin-bottom:8px;
    font-size:14px;
}
.idBox{background:#1c1f26;padding:10px;border-radius:8px;font-size:13px;word-break:break-all;}

/* PANEL CENTRAL DE USUARIOS */
#userPanel{
    display:none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    max-height: 400px;
    overflow-y: auto;
    background:#000000;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    z-index:999;
}
/* Scroll personalizado en el panel de usuarios */
#userPanel::-webkit-scrollbar { width: 10px; }
#userPanel::-webkit-scrollbar-track { background: #1c1f26; border-radius: 10px; }
#userPanel::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #ff9f1c, #ff7a18); border-radius: 10px; }
#userPanel::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #ffd26b, #ff4f00); }
/* Notificaciones */
.notify{
    position:fixed;
    top:-100px;
    left:50%;
    transform:translateX(-50%);
    background:#ff9f1c;
    color:#111;
    padding:15px 25px;
    border-radius:8px;
    font-weight:600;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    transition:top 0.5s ease, opacity 0.5s ease;
    opacity:0;
    z-index:9999;
}
.notify.show{ top:20px; opacity:1; }
.colorPicker{ margin:5px 0; }
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(-45deg, #ff00c8, #1c1f26, #0b0d12, #203040);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    z-index: -1;
}
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
</style>
</head>

<body>

<div class="notify" id="notifyBox"></div>

<!-- LOGIN -->
<div class="card" id="loginBox">
    <div class="logo">Fenix <span>Elite</span></div>
    <input id="lUser" placeholder="Usuario">
    <input id="lPass" type="password" placeholder="Contraseña">
    <label style="display:flex;align-items:center;font-size:13px;margin-top:5px;">
        <input type="checkbox" id="rememberCheck" style="margin-right:5px;"> Recordar contraseña
    </label>
    <button onclick="login()">Iniciar sesión</button>
    <div class="switch" onclick="showRegister()">Crear cuenta</div>
    <div class="msg" id="msg"></div>
</div>

<!-- REGISTRO -->
<div class="card" id="registerBox" style="display:none">
    <div class="logo">Registrar <span>Cuenta</span></div>
    <input id="rUser" placeholder="Usuario">
    <input id="rPass" type="password" placeholder="Contraseña">
    <input id="rPass2" type="password" placeholder="Confirmar Contraseña">
    <button onclick="register()">Registrar</button>
    <div class="switch" onclick="showLogin()">Volver al Login</div>
    <div class="msg" id="rmsg"></div>
</div>

<!-- PANEL PRINCIPAL -->
<div id="main">
    <div class="userLabel" id="userLabel"></div>
    <div class="configBtn" id="configBtn" onclick="toggleConfig()" style="display:none">CONFIG</div>
</div>

<!-- CONFIGURACIÓN -->
<div class="config" id="config">
    <div class="section">
        <button onclick="closeConfig()" style="background:#ffffff;margin-bottom:10px;">Volver</button>
    </div>

    <div class="section">
        <h3>GESTIÓN GENERAL</h3>
        <button onclick="borrarTodo()" style="background:red;color:white;">Borrar todas las cuentas</button>
    </div>

    <div class="section" id="sectionUsers">
        <h3>USUARIOS REGISTRADOS</h3>
        <button onclick="toggleUserPanel()">USERS</button>
        <div id="userPanel">
            <div style="margin-bottom:10px;">
                <input type="text" id="searchUser" placeholder="Buscar usuario..." style="width:100%;padding:8px;border-radius:8px;border:none;margin-bottom:5px;">
                <select id="filterRole" style="width:100%;padding:8px;border-radius:8px;border:none;">
                    <option value="all">Todos los roles</option>
                    <option value="user">User</option>
                    <option value="mod">Mod</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div id="userList"></div>
        </div>
    </div>

    <div class="section" id="sectionID">
        <h3>GENERADOR DE ID</h3>
        <button onclick="genID()">Generar ID</button>
        <div class="idBox" id="idBox"></div>
    </div>

    <div class="section" id="sectionACL">
        <h3>GESTIÓN ACL</h3>
        <input id="aclUserID" placeholder="ID del usuario">
        <select id="aclRole">
            <option value="user">User</option>
            <option value="mod">Mod</option>
            <option value="admin">Admin</option>
        </select>
        <button onclick="setACL()">Configurar ACL</button>
        <div class="msg" id="aclMsg"></div>
    </div>

    <div class="section" id="sectionInfo">
        <h3>CONFIGURACIÓN VISUAL</h3>
        <button onclick="showNotify()">Qué puedo cambiar</button>
        <div style="margin-top:10px;">
            <label>Fondo del panel: <input type="color" id="bgColor" class="colorPicker" value="#111111" onchange="updateColor('bg')"></label>
            <label>Color de botones: <input type="color" id="btnColor" class="colorPicker" value="#ff9f1c" onchange="updateColor('btn')"></label>
            <label>Color del texto: <input type="color" id="textColor" class="colorPicker" value="#ffffff" onchange="updateColor('text')"></label>
            <label>Color de títulos: <input type="color" id="titleColor" class="colorPicker" value="#ff9f1c" onchange="updateColor('title')"></label>
        </div>
    </div>
</div>

<script>
// Inicializamos base de datos simulada
if(!localStorage.getItem("fx_db")) localStorage.setItem("fx_db", JSON.stringify([]));

let currentUser=null;
let currentRole=null;
let currentUserID=null;
let userPanelVisible=false;

const msg=document.getElementById("msg");
const rmsg=document.getElementById("rmsg");

// LOGIN
function login(){
    const u=document.getElementById("lUser").value.trim();
    const p=document.getElementById("lPass").value;
    const remember=document.getElementById("rememberCheck").checked;

    let db = JSON.parse(localStorage.getItem("fx_db"));
    const userData = db.find(x=>x.user===u);

    if(!userData || userData.pass!==p){ msg.innerText="Login incorrecto"; return; }

    currentUser = u;
    currentRole = userData.role;
    currentUserID = userData.id;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("registerBox").style.display="none";
    document.getElementById("main").style.display="block";
    document.getElementById("userLabel").innerText=currentUser + " | ID: " + currentUserID;

    if(currentRole==="admin" || currentRole==="mod") document.getElementById("configBtn").style.display="block";

    if(remember){ localStorage.setItem("fx_saved_login", JSON.stringify({user:u, pass:p, remember:true})); }
    else{ localStorage.setItem("fx_saved_login", JSON.stringify({user:u, remember:false})); }

    logConnection(u);
}

// REGISTRO
function register(){
    const u = document.getElementById("rUser").value.trim();
    const p = document.getElementById("rPass").value;
    const p2 = document.getElementById("rPass2").value;
    if(!u || !p || !p2){ rmsg.innerText="Completa todos los campos"; return;}
    if(p !== p2){ rmsg.innerText="Contraseñas no coinciden"; return;}

    let db = JSON.parse(localStorage.getItem("fx_db"));
    if(db.some(x=>x.user===u)){ rmsg.innerText="Usuario ya existe"; return;}

    const newId = db.length ? Math.max(...db.map(x=>x.id))+1 : 1;
    const newUser = { user:u, pass:p, role:"user", id:newId };
    db.push(newUser);
    localStorage.setItem("fx_db", JSON.stringify(db));

    rmsg.style.color="lightgreen"; 
    rmsg.innerText = `Cuenta creada! Tu ID es ${newId}`;

    logConnection(u);
    if(userPanelVisible) loadUsers();

    setTimeout(showLogin,1200);
}

// REGISTRAR CONEXIÓN
function logConnection(u){
    const db = JSON.parse(localStorage.getItem("fx_db"));
    const entry = db.find(x=>x.user===u);
    if(!entry) return;

    let log = JSON.parse(localStorage.getItem("fx_log")||"[]");
    const index = log.findIndex(x=>x.user===u);
    const logEntry = {user:u, id:entry.id, role:entry.role};

    if(index!==-1) log[index]=logEntry;
    else log.push(logEntry);

    localStorage.setItem("fx_log", JSON.stringify(log));

    if(userPanelVisible) loadUsers();
}

// PANEL USUARIOS
function toggleUserPanel(){
    userPanelVisible = !userPanelVisible; 
    const panel = document.getElementById("userPanel");
    panel.style.display = userPanelVisible ? "block" : "none"; 
    if(userPanelVisible) loadUsers();
}

function loadUsers(){
    const db = JSON.parse(localStorage.getItem("fx_db"));
    const listDiv = document.getElementById("userList");
    listDiv.innerHTML = "";

    const searchText = document.getElementById("searchUser").value.toLowerCase();
    const filterRole = document.getElementById("filterRole").value;

    db.forEach(u=>{
        if(filterRole!=="all" && u.role!==filterRole) return;
        if(searchText && !u.user.toLowerCase().includes(searchText)) return;

        const html = `<div class="userRow" style="color:${u.role==='admin'?'red':u.role==='mod'?'orange':'white'};">
                        <b>${u.user}</b> | ID: ${u.id} | Rol: ${u.role}
                        <button style="float:right;padding:3px 6px;border:none;border-radius:5px;background:#ff9f1c;color:#111;cursor:pointer;" onclick="copyID('${u.id}')">Copiar ID</button>
                      </div>`;
        listDiv.innerHTML += html;
    });
}

// COPIAR ID CON NOTIFY
function copyID(id){
    navigator.clipboard.writeText(id);
    const notify = document.getElementById('notifyBox');
    notify.innerText = `ID ${id} copiado al portapapeles`;
    notify.classList.add('show');
    setTimeout(()=>{ notify.classList.remove('show'); }, 2500);
}

// FILTRO EN TIEMPO REAL
document.getElementById("searchUser").addEventListener("input", loadUsers);
document.getElementById("filterRole").addEventListener("change", loadUsers);

// ACTUALIZAR PANEL AUTOMÁTICAMENTE
setInterval(()=>{
    if(userPanelVisible) loadUsers();
},3000);

// OTROS FUNCIONES
function showNotify(){
    const notify = document.getElementById('notifyBox');
    notify.innerHTML = "Aquí puedes cambiar: Fondo, Botones, Texto y Títulos";
    notify.classList.add('show');
    setTimeout(()=>{ notify.classList.remove('show'); }, 3500);
}

function toggleConfig(){ document.getElementById("config").classList.toggle("open"); }
function closeConfig(){ document.getElementById("config").classList.remove("open"); }

function showRegister(){loginBox.style.display="none"; registerBox.style.display="block"; msg.innerText=""; rmsg.innerText="";}
function showLogin(){registerBox.style.display="none"; loginBox.style.display="block"; msg.innerText=""; rmsg.innerText="";}

function borrarTodo() {
    localStorage.removeItem("fx_db");
    localStorage.removeItem("fx_log");
    const notify = document.getElementById('notifyBox');
    notify.innerText = "¡Todas las cuentas han sido borradas!";
    notify.classList.add('show');
    setTimeout(()=>{ notify.classList.remove('show'); location.reload(); }, 1500);
}

function genID(){ 
    const id="GEN-"+Math.random().toString(36).substr(2,10).toUpperCase(); 
    document.getElementById("idBox").innerText=id; 
    navigator.clipboard.writeText(id); 
}

function setACL(){ 
    const id = parseInt(document.getElementById("aclUserID").value); 
    const newRole = document.getElementById("aclRole").value; 
    const aclMsg = document.getElementById("aclMsg"); 
    if(!id || !newRole){ aclMsg.innerText="Completa todos los campos"; return; }

    let db = JSON.parse(localStorage.getItem("fx_db"));
    const user = db.find(x=>x.id===id);
    if(user){ 
        user.role = newRole;
        localStorage.setItem("fx_db", JSON.stringify(db));
        aclMsg.style.color="lightgreen"; 
        aclMsg.innerText=`ACL del usuario ID ${id} actualizada a ${newRole}`;
        loadUsers();
    } else { aclMsg.innerText=`Usuario con ID ${id} no encontrado`; }
}

function updateColor(type){
    switch(type){
        case 'bg': document.querySelectorAll('.card, .config').forEach(el=>el.style.backgroundColor=document.getElementById('bgColor').value); break;
        case 'btn': document.querySelectorAll('button').forEach(el=>el.style.background=document.getElementById('btnColor').value); break;
        case 'text': document.querySelectorAll('body, input, select, .switch, .msg').forEach(el=>el.style.color=document.getElementById('textColor').value); break;
        case 'title': document.querySelectorAll('.logo, .section h3').forEach(el=>el.style.color=document.getElementById('titleColor').value); break;
    }
}
</script>
</body>
</html>
