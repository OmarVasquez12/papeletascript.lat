<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador ID + Admin + ZIP</title>

<!-- LIBRERÍA ZIP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg,#ff0080,#7928ca,#2afadf,#00ff88);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.box{
    background:#fff;
    width:460px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
}

h1,h2,h3,h4{
    text-align:center;
    color:#7928ca;
    margin-bottom:12px;
}

.section{
    border-top:1px solid #ddd;
    margin-top:15px;
    padding-top:15px;
}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    background:#7928ca;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ff0080;
}

.hidden{ display:none; }

ul{
    list-style:none;
    padding:0;
    font-size:14px;
}

.logout{
    margin-top:15px;
    background:#444;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
    <h2>Iniciar Sesión</h2>
    <input id="loginUser" placeholder="Usuario">
    <input id="loginPass" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
</div>

<!-- PANEL PRINCIPAL -->
<div class="box hidden" id="mainBox">
    <h1>Generador de ID</h1>

    <!-- GENERADOR -->
    <button onclick="generateID()">Generar ID</button>
    <div id="generatedID" style="text-align:center;font-size:22px;margin:10px 0">---</div>
    <button onclick="copyID()">Copiar ID</button>

    <!-- PANEL ADMIN -->
    <div class="section hidden" id="adminPanel">
        <h3>Panel Admin</h3>

        <!-- COMPRESOR SOLO ADMIN -->
        <h4>Comprimir Archivo (Solo Admin)</h4>
        <input type="file" id="fileInput">
        <button onclick="compressFile()">Comprimir y Descargar</button>

        <hr style="margin:15px 0">

        <input id="aclUser" placeholder="Usuario a dar ACL">
        <button onclick="giveACL()">Dar ACL</button>

        <h4 style="margin-top:10px">Usuarios con ACL</h4>
        <ul id="aclList"></ul>
    </div>

    <button class="logout" onclick="logout()">Cerrar sesión</button>
</div>

<script>
// ADMIN
const ADMIN_USER = "Omar"
const ADMIN_PASS = "contraseña1234"

// AUTO SESIÓN
if(localStorage.getItem("session")){
    showMain()
}

// LOGIN
function login(){
    const u = loginUser.value.trim()
    const p = loginPass.value.trim()

    if(u === ADMIN_USER && p === ADMIN_PASS){
        localStorage.setItem("session","admin")
        showMain(true)
        return
    }

    let users = JSON.parse(localStorage.getItem("users")) || {}
    if(users[u] && users[u].pass === p){
        localStorage.setItem("session","user")
        showMain(false)
    }else{
        alert("Datos incorrectos")
    }
}

// MOSTRAR PANEL
function showMain(isAdmin){
    loginBox.classList.add("hidden")
    mainBox.classList.remove("hidden")

    if(isAdmin || localStorage.getItem("session")==="admin"){
        adminPanel.classList.remove("hidden")
        loadACLs()
    }
}

// LOGOUT
function logout(){
    localStorage.clear()
    location.reload()
}

// USERS STORAGE
if(!localStorage.getItem("users")){
    localStorage.setItem("users", JSON.stringify({}))
}

// ACL
function giveACL(){
    let user = aclUser.value.trim()
    let users = JSON.parse(localStorage.getItem("users"))

    if(!users[user]){
        alert("Usuario no existe")
        return
    }

    users[user].acl = true
    localStorage.setItem("users", JSON.stringify(users))
    loadACLs()
}

function loadACLs(){
    aclList.innerHTML=""
    let users = JSON.parse(localStorage.getItem("users"))
    for(let u in users){
        if(users[u].acl){
            let li = document.createElement("li")
            li.textContent = "✔ " + u
            aclList.appendChild(li)
        }
    }
}

// GENERADOR
function generateID(){
    const c="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"
    let id=""
    for(let i=0;i<8;i++){
        id+=c[Math.floor(Math.random()*c.length)]
    }
    generatedID.textContent=id
}

function copyID(){
    navigator.clipboard.writeText(generatedID.textContent)
    alert("ID copiado")
}

// COMPRESOR (VALIDA ADMIN)
async function compressFile(){
    if(localStorage.getItem("session") !== "admin"){
        alert("No tienes permiso ❌")
        return
    }

    const input = document.getElementById("fileInput")
    if(input.files.length === 0){
        alert("Sube un archivo primero")
        return
    }

    const file = input.files[0]
    const zip = new JSZip()
    zip.file(file.name, file)

    const blob = await zip.generateAsync({type:"blob"})
    const a = document.createElement("a")
    a.href = URL.createObjectURL(blob)
    a.download = file.name + ".zip"
    a.click()
    URL.revokeObjectURL(a.href)
}
</script>

</body>
</html>
