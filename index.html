<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <title>Fenix Elite Pvp - Corregido</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{margin:0;height:100vh;background:#0b0d12;color:white;transition:0.3s;overflow:hidden;}
        
        /* Fondo */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #1c1f26, #0b0d12, #203040);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; z-index: -1;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Tarjetas */
        .card{width:380px;background:#111;padding:30px;border-radius:18px;margin:120px auto;border: 1px solid #222;box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .logo{text-align:center;font-size:32px;font-weight:700;margin-bottom:20px;}
        .logo span{color:#ff9f1c;}
        input,button,select{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;}
        input,select{background:#1c1f26;color:white;border: 1px solid #333;}
        button{background:linear-gradient(135deg,#ff9f1c,#ff7a18);font-weight:700;cursor:pointer;color:#111;}
        button:hover{transform:scale(1.02);}
        .switch{text-align:center;font-size:13px;color:#aaa;cursor:pointer;margin-top:10px;}
        .msg{text-align:center;font-size:13px;margin-top:10px;font-weight:bold;}

        /* Panel Principal */
        #main{display:none;padding:30px;}
        .top-bar { position: fixed; top: 20px; right: 25px; display: flex; gap: 10px; z-index: 100; }
        .userLabel{ background: rgba(0,0,0,0.7); color: #ff9f1c; padding: 8px 15px; border-radius: 20px; border: 1px solid #ff9f1c; font-weight: 600; }
        .btn-logout{ background: #ff4b2b; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold;}

        /* Configuración Lateral */
        .config {
            position: fixed; top: 0; right: -360px; width: 340px; height: 100%;
            background: #111; padding: 25px; transition: 0.3s; z-index: 1000; border-left: 2px solid #ff9f1c;
        }
        .config.open{right:0;}
        .section{margin-bottom:20px; border-bottom: 1px solid #222; padding-bottom: 10px;}
        .section h3{color:#ff9f1c; font-size: 14px;}

        /* Lista de Usuarios */
        #userPanel{
            display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; max-height: 500px; background:#111; padding:20px; border-radius:12px; border: 1px solid #ff9f1c; z-index:2000;
        }
        .userRow{ background:#1c1f26; padding:10px; border-radius:8px; margin-bottom:8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px;}

        .notify{
            position:fixed; top:-100px; left:50%; transform:translateX(-50%);
            background:#ff9f1c; color:#111; padding:15px 30px; border-radius:10px; font-weight:bold; transition:0.5s; z-index:9999;
        }
        .notify.show{ top:30px; }
    </style>
</head>
<body>

<div class="notify" id="notifyBox"></div>

<div class="card" id="loginBox">
    <div class="logo">Fenix <span>Elite</span></div>
    <input id="lUser" placeholder="Usuario">
    <input id="lPass" type="password" placeholder="Contraseña">
    <button onclick="login()">ENTRAR</button>
    <div class="switch" onclick="showRegister()">¿No tienes cuenta? Regístrate</div>
    <div id="msg" class="msg"></div>
</div>

<div class="card" id="registerBox" style="display:none">
    <div class="logo">Registrar <span>Cuenta</span></div>
    <input id="rUser" placeholder="Nuevo Usuario">
    <input id="rPass" type="password" placeholder="Contraseña">
    <input id="rPass2" type="password" placeholder="Confirmar Contraseña">
    <button onclick="register()">CREAR CUENTA</button>
    <div class="switch" onclick="showLogin()">Volver al Login</div>
    <div id="rmsg" class="msg"></div>
</div>

<div id="main">
    <div class="top-bar">
        <div class="userLabel" id="userLabel">Cargando...</div>
        <button id="configBtn" style="display:none; width:auto; padding:8px 15px;" onclick="toggleConfig()">CONFIG</button>
        <button class="btn-logout" onclick="logout()">SALIR</button>
    </div>
    <div style="text-align:center; margin-top:200px;">
        <h1>BIENVENIDO A FENIX ELITE</h1>
        <p>Tu sesión está activa correctamente.</p>
    </div>
</div>

<div class="config" id="config">
    <div class="section"><button onclick="toggleConfig()">CERRAR</button></div>
    <div class="section">
        <h3>USUARIOS</h3>
        <button onclick="toggleUserPanel()">VER LISTA DE JUGADORES</button>
    </div>
    <div class="section" id="sectionACL">
        <h3>GESTIÓN RANGOS</h3>
        <input id="aclUserID" placeholder="ID del usuario">
        <select id="aclRole">
            <option value="user">User</option>
            <option value="mod">Mod</option>
            <option value="admin">Admin</option>
        </select>
        <button onclick="setACL()">CAMBIAR RANGO</button>
    </div>
    <div class="section">
        <h3>SISTEMA</h3>
        <button onclick="borrarTodo()" style="background:#ff4b2b; color:white;">BORRAR TODO</button>
    </div>
</div>

<div id="userPanel">
    <h3 style="color:#ff9f1c">Jugadores Registrados</h3>
    <input type="text" id="searchUser" placeholder="Buscar..." oninput="loadUsers()">
    <div id="userList" style="max-height:300px; overflow-y:auto;"></div>
    <button onclick="toggleUserPanel()" style="margin-top:10px; background:#444; color:white;">CERRAR</button>
</div>

<script>
// --- LÓGICA DE BASE DE DATOS ---

// Inicializar el contador de IDs si no existe
if (!localStorage.getItem("fx_last_id")) {
    localStorage.setItem("fx_last_id", "1");
}

// Admin predeterminado
if (!localStorage.getItem("fx_Omar")) {
    localStorage.setItem("fx_Omar", JSON.stringify({pass:"1234", role:"admin", id:1}));
}

function showNotify(txt) {
    const b = document.getElementById('notifyBox');
    b.innerText = txt; b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 3000);
}

function showRegister() { document.getElementById("loginBox").style.display="none"; document.getElementById("registerBox").style.display="block"; }
function showLogin() { document.getElementById("registerBox").style.display="none"; document.getElementById("loginBox").style.display="block"; }

// REGISTRO CORREGIDO
function register() {
    const u = document.getElementById("rUser").value.trim();
    const p = document.getElementById("rPass").value;
    const p2 = document.getElementById("rPass2").value;

    if (!u || !p || p !== p2) { document.getElementById("rmsg").innerText = "Datos inválidos"; return; }
    if (localStorage.getItem("fx_" + u)) { document.getElementById("rmsg").innerText = "El usuario ya existe"; return; }

    // OBTENER Y ACTUALIZAR ID (IMPORTANTE)
    let lastId = parseInt(localStorage.getItem("fx_last_id"));
    let newId = lastId + 1;
    
    // GUARDAR EL NUEVO ID MÁXIMO PARA QUE NO SE REPITA EL 2
    localStorage.setItem("fx_last_id", newId.toString());
    
    // Guardar usuario
    const userData = { pass: p, role: "user", id: newId };
    localStorage.setItem("fx_" + u, JSON.stringify(userData));

    showNotify("¡Cuenta creada! Tu ID es " + newId);
    setTimeout(showLogin, 1500);
}

function login() {
    const u = document.getElementById("lUser").value.trim();
    const p = document.getElementById("lPass").value;
    const data = JSON.parse(localStorage.getItem("fx_" + u) || "null");

    if (!data || data.pass !== p) {
        document.getElementById("msg").innerText = "Error de acceso";
        return;
    }
    
    localStorage.setItem("fx_session", JSON.stringify({user:u, role:data.role, id:data.id}));
    location.reload(); // Recargar para activar sesión
}

// Cargar Sesión al iniciar
window.onload = function() {
    const session = JSON.parse(localStorage.getItem("fx_session") || "null");
    if (session) {
        document.getElementById("loginBox").style.display="none";
        document.getElementById("main").style.display="block";
        document.getElementById("userLabel").innerText = `${session.user} (ID: ${session.id})`;
        
        if (session.role === "admin" || session.role === "mod") {
            document.getElementById("configBtn").style.display = "block";
        }
    }
};

function logout() {
    localStorage.removeItem("fx_session");
    location.reload();
}

function toggleConfig() { document.getElementById("config").classList.toggle("open"); }

function toggleUserPanel() {
    const p = document.getElementById("userPanel");
    p.style.display = (p.style.display === "block") ? "none" : "block";
    if (p.style.display === "block") loadUsers();
}

// LISTA DE USUARIOS SIN ERRORES
function loadUsers() {
    const list = document.getElementById("userList");
    const search = document.getElementById("searchUser").value.toLowerCase();
    list.innerHTML = "";

    // Filtro para ignorar archivos del sistema
    const ignore = ["fx_last_id", "fx_session", "fx_log", "fx_saved_login"];

    Object.keys(localStorage).forEach(key => {
        if (key.startsWith("fx_") && !ignore.includes(key)) {
            const name = key.replace("fx_", "");
            const data = JSON.parse(localStorage.getItem(key));

            if (data && data.id && name.toLowerCase().includes(search)) {
                list.innerHTML += `
                <div class="userRow">
                    <span><b>${name}</b> (ID: ${data.id}) - ${data.role}</span>
                    <button onclick="alert('ID: ${data.id}')" style="width:auto; padding:5px;">INFO</button>
                </div>`;
            }
        }
    });
}

function setACL() {
    const id = document.getElementById("aclUserID").value;
    const role = document.getElementById("aclRole").value;
    let found = false;

    Object.keys(localStorage).forEach(key => {
        if (key.startsWith("fx_")) {
            let data = JSON.parse(localStorage.getItem(key));
            if (data && data.id == id) {
                data.role = role;
                localStorage.setItem(key, JSON.stringify(data));
                found = true;
            }
        }
    });

    if (found) { showNotify("Rango actualizado"); loadUsers(); }
    else { alert("ID no encontrado"); }
}

function borrarTodo() {
    if(confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); }
}
</script>
</body>
</html>
