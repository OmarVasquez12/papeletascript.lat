<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenix Elite • Login Discord</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD PRINCIPAL */
.card {
    width: 360px;
    background: #111;
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 0 30px rgba(0,0,0,.6);
    text-align: center;
    color: white;
}

.logo {
    font-size: 38px;
    margin-bottom: 25px;
}

.logo span {
    color: #ff9f1c;
}

/* BOTÓN DISCORD */
.discord-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #5865F2;
    padding: 14px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: transform 0.2s, box-shadow 0.2s;
}

.discord-btn img {
    width: 26px;
    filter: invert(1);
}

.discord-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.5);
}

.note {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 15px;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.modal-box {
    background: #1a1a1a;
    color: white;
    padding: 25px;
    border-radius: 14px;
    width: 340px;
}

.modal-box h2 {
    margin-top: 0;
    margin-bottom: 10px;
}

.modal-box ul {
    padding-left: 20px;
    margin: 15px 0;
    font-size: 14px;
}

.modal-box li {
    margin-bottom: 6px;
}

.modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.modal-buttons button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
}

.cancel {
    background: #333;
    color: white;
}

.accept {
    background: #5865F2;
    color: white;
}
</style>
</head>

<body>

<!-- CARD -->
<div class="card">
    <div class="logo">🔥 <span>Fenix</span> Elite</div>

    <div class="discord-btn" onclick="openDiscordModal()">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg">
        <span>Iniciar con Discord</span>
    </div>

    <div class="note">
        Acceso seguro mediante Discord
    </div>
</div>

<!-- MODAL -->
<div class="modal" id="discordModal">
    <div class="modal-box">
        <h2>🔐 Iniciar sesión con Discord</h2>
        <p>Fenix Elite quiere acceder a:</p>
        <ul>
            <li>✔️ Tu nombre de usuario</li>
            <li>✔️ Tu avatar</li>
            <li>✔️ Tu correo electrónico</li>
        </ul>

        <div class="modal-buttons">
            <button class="cancel" onclick="closeDiscordModal()">Cancelar</button>
            <button class="accept" onclick="loginDiscord()">Continuar</button>
        </div>
    </div>
</div>

<script>
function openDiscordModal() {
    document.getElementById("discordModal").style.display = "flex";
}

function closeDiscordModal() {
    document.getElementById("discordModal").style.display = "none";
}

function loginDiscord() {
    const CLIENT_ID = "TU_CLIENT_ID_DISCORD";
    const REDIRECT_URI = "https://tupagina.com/callback";
    const SCOPE = "identify email";

    const url =
        "https://discord.com/oauth2/authorize" +
        "?client_id=" + CLIENT_ID +
        "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
        "&response_type=token" +
        "&scope=" + SCOPE;

    window.location.href = url;
}
</script>

</body>
</html>
