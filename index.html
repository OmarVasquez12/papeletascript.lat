<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Seguro - Compresión Cifrada</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
#login,#panel{
    background:rgba(0,0,0,.6);
    padding:25px;
    border-radius:12px;
    width:360px;
}
input,button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:6px;
}
button{
    background:#00e1ff;
    font-weight:bold;
    cursor:pointer;
}
.progress{
    width:100%;
    height:12px;
    background:#222;
    margin-top:10px;
    border-radius:6px;
    overflow:hidden;
    display:none;
}
.progress div{
    height:100%;
    width:0%;
    background:lime;
}
</style>
</head>

<body>

<!-- LOGIN ADMIN -->
<div id="login">
    <h2>Login Admin</h2>
    <input id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">
    <h2>Compresor Cifrado</h2>
    <input type="file" id="file">
    <button onclick="secureCompress()">Cifrar + Comprimir</button>

    <div class="progress" id="prog">
        <div id="bar"></div>
    </div>
</div>

<script>
// ===== CONFIG ADMIN =====
const ADMIN_USER = "Omar"
const ADMIN_PASS = "contraseña1234"

// clave interna (el usuario NO la ve)
const INTERNAL_KEY = "X9@#AesKey_Ocult4_2026"

// ===== LOGIN =====
function login(){
    if(
        user.value === ADMIN_USER &&
        pass.value === ADMIN_PASS
    ){
        login.style.display = "none"
        panel.style.display = "block"
    }else{
        alert("Acceso denegado ❌")
    }
}

// ===== CIFRADO AES =====
async function encrypt(data, password){
    const enc = new TextEncoder()

    const keyMaterial = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
    )

    const salt = crypto.getRandomValues(new Uint8Array(16))
    const key = await crypto.subtle.deriveKey(
        {
            name: "PBKDF2",
            salt: salt,
            iterations: 150000,
            hash: "SHA-256"
        },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt"]
    )

    const iv = crypto.getRandomValues(new Uint8Array(12))
    const encrypted = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv: iv },
        key,
        data
    )

    return { encrypted, salt, iv }
}

// nombre ilegible
function randomName(){
    return crypto.getRandomValues(new Uint8Array(24))
        .reduce((s,b)=>s+b.toString(16).padStart(2,"0"),"")
}

// ===== COMPRESIÓN SEGURA =====
async function secureCompress(){
    const f = file.files[0]
    if(!f) return alert("Sube un archivo")

    prog.style.display = "block"
    bar.style.width = "0%"

    const buffer = await f.arrayBuffer()
    const encData = await encrypt(buffer, INTERNAL_KEY)

    const zip = new JSZip()
    zip.file(randomName()+".bin", encData.encrypted)
    zip.file("iv.bin", encData.iv)
    zip.file("salt.bin", encData.salt)

    const blob = await zip.generateAsync(
        { type: "blob" },
        p => bar.style.width = p.percent + "%"
    )

    const a = document.createElement("a")
    a.href = URL.createObjectURL(blob)
    a.download = "archivo_compilado.zip"
    a.click()
}
</script>

</body>
</html>
