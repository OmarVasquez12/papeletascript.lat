<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papeleta Licensing - MTA Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --bg-dark:#070707;
    --card-bg:#0d0606;
    --accent-red:#cc1b1b;
    --bright-red:#ff1a1a;
    --text-gray:#666;
    --input-white:#ffffff;
}

body {
    background:var(--bg-dark);
    color:#eee;
    font-family:Inter,sans-serif;
    margin:0;
    padding:40px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.wrapper { width:100%; max-width:1200px; }

.main-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.logo-box {
    border:2px solid var(--accent-red);
    padding:8px 12px;
    border-radius:8px;
    font-weight:900;
    font-size:26px;
    color:var(--accent-red);
}

.stats { display:flex; gap:20px; }

.stat-card {
    background:var(--card-bg);
    padding:12px 30px;
    border-radius:18px;
    text-align:center;
    border:1px solid #1a0d0d;
}

.stat-card strong {
    display:block;
    color:var(--bright-red);
    font-size:24px;
}

.dashboard-grid {
    display:grid;
    grid-template-columns:350px 1fr;
    gap:25px;
}

.card {
    background:var(--card-bg);
    border:1px solid #1a0d0d;
    border-radius:20px;
    padding:30px;
    margin-bottom:20px;
}

.input-group { margin-bottom:15px; }

.input-group label {
    display:block;
    font-size:10px;
    font-weight:bold;
    color:var(--text-gray);
    margin-bottom:8px;
}

.input-group input {
    width:100%;
    padding:12px 15px;
    border-radius:10px;
    border:none;
    background:var(--input-white);
    color:#111;
    outline:none;
    box-sizing:border-box;
}

.btn-generate {
    width:100%;
    background:var(--bright-red);
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    font-weight:900;
    cursor:pointer;
    transition: 0.2s;
}

.btn-generate:hover { background: #e60000; transform: scale(1.02); }

.output-area {
    background:#000;
    border-radius:10px;
    padding:15px;
    position: relative;
    margin-bottom: 10px;
    min-height: 60px;
}

#statusLog {
    font-size: 11px;
    margin-top: 5px;
    color: #888;
    font-family: monospace;
    font-weight: bold;
}

pre {
    color:#00ff44;
    font-family:monospace;
    font-size:13px;
    margin:0;
    white-space:pre-wrap;
}

.btn-copy {
    position: absolute;
    top: 5px;
    right: 5px;
    background: #333;
    color: #fff;
    border: none;
    font-size: 9px;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
}

table { width:100%; border-collapse:collapse; }

th {
    text-align:left;
    font-size:11px;
    color:var(--text-gray);
    padding-bottom:20px;
}

tr.clickable { cursor:pointer; transition: background 0.2s; }
tr.clickable:hover { background: rgba(255,255,255,0.02); }

.status-dot {
    height:12px;
    width:12px;
    border-radius:50%;
    display:inline-block;
    cursor: pointer;
}

.status-on { background:#00ff44; box-shadow:0 0 10px #00ff44; }
.status-off { background:#ff0000; box-shadow:0 0 10px #ff0000; }

.btn-delete {
    background:none;
    border:none;
    color:#721c1c;
    font-weight:bold;
    cursor:pointer;
    font-size:10px;
}
</style>
</head>

<body>

<div id="lockScreen" style="position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999;">
    <div style="background:#0d0606;padding:40px;border-radius:20px;text-align:center;border:1px solid #1a0d0d;">
        <h2 style="letter-spacing: 2px;">ACCESO PANEL</h2>
        <input id="pinInput" type="password" maxlength="4" placeholder="PIN"
        style="padding:15px;font-size:20px;text-align:center;border-radius:10px;border:none; width: 100px;">
        <br><br>
        <button class="btn-generate" onclick="checkPIN()">ENTRAR</button>
        <p id="pinError" style="color:red;font-size:12px;margin-top:10px;"></p>
    </div>
</div>

<div class="wrapper">
    <header class="main-header">
        <div style="display:flex;align-items:center;gap:15px;">
            <div class="logo-box">PL</div>
            <div>
                <h1 style="margin:0;font-size:28px;">PAPELETA LICENCIA</h1>
                <p style="margin:0;color:#666;font-size:11px;">PROTEGE TU SERVIDOR </p>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card"><span>TOTAL</span><strong id="total-count">0</strong></div>
            <div class="stat-card"><span>ACTIVAS</span><strong id="active-count">0</strong></div>
        </div>
    </header>

    <div class="dashboard-grid">
        <aside>
            <div class="card">
                <h3>NUEVA LICENCIA</h3>
                <div class="input-group">
                    <label>NOMBRE DEL RECURSO</label>
                    <input type="text" id="resourceName" placeholder="Ej: sistema_facciones">
                </div>
                <div class="input-group">
                    <label>IP SERVIDOR</label>
                    <input type="text" id="ipAddr" placeholder="Ej: 192.168.1.1">
                </div>
                <button class="btn-generate" onclick="addLicense()">GENERAR Y ACTIVAR</button>
                <div id="statusLog">Esperando acción...</div>
            </div>

            <div class="card">
                <h3>CONFIG.LUA (CLIENTE)</h3>
                <div class="output-area">
                    <button class="btn-copy" onclick="copyText('luaCode')">COPIAR</button>
                    <pre id="luaCode">-- Selecciona una licencia</pre>
                </div>
            </div>
        </aside>

        <section>
            <div class="card">
                <table id="licenseTable">
                    <thead>
                        <tr>
                            <th>ESTADO</th>
                            <th>RECURSO</th>
                            <th>IP</th>
                            <th>USER</th>
                            <th>ACCIÓN</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </div>
</div>

<script>
// --- CONFIGURACIÓN DE SEGURIDAD ---
// PEGA TU TOKEN AQUÍ ESCRITO AL REVÉS (DE DERECHA A IZQUIERDA)
const TOKEN_REVERSE = "V199gUNn7XtYKCXSkbqlFQ50b2O7qqpt23uW23eIIB4P_QVZWlNgk3EBC0Q2LN74B11_tap_buhtig"; 

const OWNER = "OmarVasquez12";
const REPO = "omarvasquez12.github.io";
const PATH = "validar.json";

document.addEventListener('DOMContentLoaded', loadLicenses);

function checkPIN(){
    const pin = document.getElementById("pinInput").value;
    if(pin === "0325"){
        document.getElementById("lockScreen").style.display = "none";
    } else {
        document.getElementById("pinError").innerText = "PIN incorrecto";
    }
}

function updateLog(msg, isError = false) {
    const log = document.getElementById("statusLog");
    log.innerText = msg;
    log.style.color = isError ? "#ff1a1a" : "#00ff44";
}

async function actualizarGitHubAutomatico(listaLicencias) {
    updateLog("🔄 Sincronizando...");
    
    // Des-ofuscamos el token solo para la petición
    const token = TOKEN_REVERSE.split("").reverse().join("");
    const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`;

    const dataJSON = {
        licencias: listaLicencias.filter(l => l.active).map(l => ({
            user: l.user,
            key: l.key,
            status: "active"
        }))
    };

    const contenidoBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(dataJSON, null, 2))));

    try {
        const resGet = await fetch(url, {
            headers: { 
                "Authorization": `Bearer ${token}`,
                "Cache-Control": "no-cache",
                "Accept": "application/vnd.github.v3+json"
            }
        });
        
        if (!resGet.ok) {
            updateLog("❌ Token inválido o bloqueado por GitHub", true);
            return;
        }

        const dataGet = await resGet.json();
        const sha = dataGet.sha;

        const resPut = await fetch(url, {
            method: "PUT",
            headers: {
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json",
                "Accept": "application/vnd.github.v3+json"
            },
            body: JSON.stringify({
                message: "Panel: Sync Licencias",
                content: contenidoBase64,
                sha: sha
            })
        });

        if (resPut.ok) {
            updateLog("✅ ¡Base de datos actualizada!");
        } else {
            updateLog("❌ Error al guardar (Permisos)", true);
        }
    } catch (e) {
        updateLog("❌ Error de red", true);
    }
}

function generateRandomString(length) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let result = '';
    for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
}

function updateStats(){
    const licenses = JSON.parse(localStorage.getItem('licenses')) || [];
    document.getElementById("total-count").innerText = licenses.length;
    document.getElementById("active-count").innerText = licenses.filter(l => l.active).length;
}

function addLicense(){
    const resource = document.getElementById("resourceName").value.trim().toUpperCase();
    const ip = document.getElementById("ipAddr").value.trim();

    if(!resource || !ip) return alert("Completa los datos");

    const randomUser = "USER_" + generateRandomString(6);
    const randomKey = generateRandomString(32);

    let licenses = JSON.parse(localStorage.getItem('licenses')) || [];
    const lic = { id: Date.now(), resource, ip, user: randomUser, key: randomKey, active: true };

    licenses.push(lic);
    localStorage.setItem('licenses', JSON.stringify(licenses));

    renderRow(lic);
    updateStats();
    showLuaSingle(lic);
    actualizarGitHubAutomatico(licenses); 

    document.getElementById("resourceName").value = "";
    document.getElementById("ipAddr").value = "";
}

function renderRow(lic){
    const row = document.createElement("tr");
    row.className="clickable";
    row.dataset.id = lic.id;
    row.innerHTML = `
        <td><span class="status-dot ${lic.active?'status-on':'status-off'}" onclick="toggleStatus(${lic.id},this);event.stopPropagation();"></span></td>
        <td style="color:red;font-weight:900;">${lic.resource}</td>
        <td>${lic.ip}</td>
        <td style="font-size:11px;">${lic.user}</td>
        <td><button class="btn-delete" onclick="deleteLicense(${lic.id})">BORRAR</button></td>
    `;
    row.onclick = () => {
        if(lic.active) showLuaSingle(lic);
        else document.getElementById("luaCode").innerText = "-- Licencia Desactivada";
    };
    document.querySelector("#licenseTable tbody").prepend(row);
}

function toggleStatus(id, el){
    let licenses = JSON.parse(localStorage.getItem('licenses')) || [];
    const i = licenses.findIndex(l => l.id === id);
    if(i === -1) return;
    licenses[i].active = !licenses[i].active;
    localStorage.setItem('licenses', JSON.stringify(licenses));
    el.className = `status-dot ${licenses[i].active?'status-on':'status-off'}`;
    updateStats();
    actualizarGitHubAutomatico(licenses);
}

function showLuaSingle(l){
    document.getElementById("luaCode").innerText = `configLicense = {\n    ["User"] = "${l.user}",\n    ["Key"] = "${l.key}",\n}`;
}

function copyText(id) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text).then(() => alert("Copiado"));
}

function deleteLicense(id){
    if(!confirm("¿Borrar?")) return;
    let licenses = JSON.parse(localStorage.getItem('licenses')) || [];
    licenses = licenses.filter(l => l.id !== id);
    localStorage.setItem('licenses', JSON.stringify(licenses));
    const row = document.querySelector(`tr[data-id="${id}"]`);
    if(row) row.remove();
    updateStats();
    actualizarGitHubAutomatico(licenses);
}

function loadLicenses(){
    const licenses = JSON.parse(localStorage.getItem('licenses')) || [];
    licenses.forEach(renderRow);
    updateStats();
}
</script>
</body>
</html>
