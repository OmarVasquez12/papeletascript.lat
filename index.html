<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Generador + Compresor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#loginBox, #panel{
    background:rgba(0,0,0,.6);
    padding:25px;
    border-radius:12px;
    width:350px;
    box-shadow:0 0 20px #000;
}

input, button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:6px;
}

button{
    background:#00c6ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00f2ff;
}

.section{
    margin-top:20px;
}

.progress{
    width:100%;
    height:12px;
    background:#222;
    border-radius:6px;
    overflow:hidden;
    margin-top:10px;
    display:none;
}

.progress div{
    height:100%;
    width:0%;
    background:lime;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Login Admin</h2>
    <input type="password" id="password" placeholder="Contraseña admin">
    <button onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">
    <h2>Panel Generador</h2>

    <div class="section">
        <h3>Comprimir Archivo (ADMIN)</h3>
        <input type="file" id="fileInput">
        <button onclick="compressFile()">Comprimir y Descargar</button>

        <div class="progress" id="progressBox">
            <div id="progressBar"></div>
        </div>
    </div>
</div>

<script>
const ADMIN_PASSWORD = "1234" // CAMBIA ESTO
let isAdmin = false

function login(){
    const pass = document.getElementById("password").value
    if(pass === ADMIN_PASSWORD){
        isAdmin = true
        document.getElementById("loginBox").style.display = "none"
        document.getElementById("panel").style.display = "block"
    }else{
        alert("Contraseña incorrecta ❌")
    }
}

// GENERA TEXTO RANDOM (NOMBRE ILEGIBLE)
function randomName(len=20){
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"
    let result = ""
    for(let i=0;i<len;i++){
        result += chars.charAt(Math.floor(Math.random()*chars.length))
    }
    return result
}

async function compressFile(){
    if(!isAdmin){
        alert("Solo admin puede comprimir ❌")
        return
    }

    const input = document.getElementById("fileInput")
    if(input.files.length === 0){
        alert("Sube un archivo primero")
        return
    }

    const progressBox = document.getElementById("progressBox")
    const bar = document.getElementById("progressBar")
    progressBox.style.display = "block"
    bar.style.width = "0%"

    const file = input.files[0]
    const zip = new JSZip()

    // NOMBRE INTERNO OFUSCADO
    const fakeName = randomName(32) + ".bin"
    zip.file(fakeName, file)

    const blob = await zip.generateAsync(
        {type:"blob"},
        (meta)=>{
            bar.style.width = meta.percent.toFixed(0) + "%"
        }
    )

    const a = document.createElement("a")
    a.href = URL.createObjectURL(blob)
    a.download = "archivo_compilado.zip"
    a.click()

    URL.revokeObjectURL(a.href)
    setTimeout(()=>progressBox.style.display="none",1000)
}
</script>

</body>
</html>
