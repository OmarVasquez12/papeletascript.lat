<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papeleta Licensing - MTA Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
:root {
    --bg-dark:#070707;
    --card-bg:#0d0606;
    --accent-red:#cc1b1b;
    --bright-red:#ff1a1a;
    --text-gray:#666;
    --input-white:#ffffff;
}

body {
    background:var(--bg-dark);
    color:#eee;
    font-family:Inter,sans-serif;
    margin:0;
    padding:40px;
    display:flex;
    flex-direction:column;
    align-items:center;
    -webkit-user-select: none;
    user-select: none;
    overflow-x: hidden;
}

#particles-js {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 1;
}

input, pre, #luaCode, .btn-generate, .btn-copy {
    -webkit-user-select: text;
    user-select: text;
}

.wrapper { width:100%; max-width:1200px; position: relative; z-index: 2; }

.main-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.brand-container { display: flex; align-items: center; gap: 15px; }

.logo-square {
    border: 2px solid var(--bright-red);
    padding: 8px 12px;
    border-radius: 10px;
    font-weight: 900;
    font-size: 28px;
    color: var(--bright-red);
}

.brand-text h1, .brand-text h2 {
    margin: 0; font-size: 28px; font-weight: 900; letter-spacing: 1px;
    text-shadow: 2px 0px 0px rgba(255, 0, 0, 0.3);
}

.brand-text p { margin: 0; color: var(--text-gray); font-size: 11px; font-weight: bold; }

.stats { display:flex; gap:20px; }
.stat-card {
    background:var(--card-bg);
    padding:12px 30px;
    border-radius:18px;
    text-align:center;
    border:1px solid #1a0d0d;
}
.stat-card strong { display:block; color:var(--bright-red); font-size:24px; }

.dashboard-grid { display:grid; grid-template-columns:350px 1fr; gap:25px; }

.card {
    background:var(--card-bg);
    border:1px solid #1a0d0d;
    border-radius:20px;
    padding:30px;
    margin-bottom:20px;
}

.input-group { margin-bottom:15px; }
.input-group label { display:block; font-size:10px; font-weight:bold; color:var(--text-gray); margin-bottom:8px; }
.input-group input {
    width:100%; padding:12px 15px; border-radius:10px; border:none;
    background:var(--input-white); color:#111; outline:none; box-sizing:border-box;
}

.btn-generate {
    width:100%; background:var(--bright-red); color:white; border:none;
    padding:15px; border-radius:10px; font-weight:900; cursor:pointer;
    transition: 0.2s; position: relative; z-index: 10;
}
.btn-generate:hover { background: #e60000; transform: scale(1.02); }

.btn-action-small {
    background: #333; color: #fff; border: none; padding: 6px 12px;
    border-radius: 6px; font-size: 10px; cursor: pointer; margin-top: 5px;
}

.output-area { background:#000; border-radius:10px; padding:15px; position: relative; min-height: 60px; }
#statusLog { font-size: 11px; margin-top: 5px; color: #888; font-family: monospace; }
pre { color:#00ff44; font-family:monospace; font-size:13px; margin:0; white-space:pre-wrap; }

.btn-copy { position: absolute; top: 5px; right: 5px; background: #333; color: #fff; border: none; font-size: 9px; padding: 4px 8px; border-radius: 4px; cursor: pointer; }

table { width:100%; border-collapse:collapse; }
th { text-align:left; font-size:11px; color:var(--text-gray); padding-bottom:20px; }
tr.clickable { cursor:pointer; transition: background 0.2s; }
tr.clickable:hover { background: rgba(255,255,255,0.02); }

.status-dot { height:12px; width:12px; border-radius:50%; display:inline-block; cursor: pointer; }
.status-on { background:#00ff44; box-shadow:0 0 10px #00ff44; }
.status-off { background:#ff0000; box-shadow:0 0 10px #ff0000; }

.btn-delete { background:none; border:none; color:#721c1c; font-weight:bold; cursor:pointer; font-size:10px; }

#lockScreen { position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999; }
#loginBox { background:#0d0606; padding:40px; border-radius:20px; text-align:center; border:1px solid #1a0d0d; position: relative; z-index: 5; }
</style>
</head>

<body>

<div id="lockScreen">
    <div id="particles-js"></div>
    <div id="loginBox">
        <div class="brand-container" style="justify-content: center; margin-bottom: 25px;">
            <div class="logo-square">PL</div>
            <div class="brand-text" style="text-align: left;">
                <h2>ACCESO</h2>
                <p>PANEL LICENCIAS</p>
            </div>
        </div>
        <input id="pinInput" type="password" maxlength="4" placeholder="PIN" style="padding:15px;font-size:20px;text-align:center;border-radius:10px;border:none; width: 120px;">
        <div style="margin: 15px 0; font-size: 12px; color: #666;">
            <input type="checkbox" id="savePinCheck"> <label for="savePinCheck">Recordar sesión</label>
        </div>
        <button class="btn-generate" onclick="checkPIN()">ENTRAR</button>
        <p id="pinError" style="color:red;font-size:12px;margin-top:10px;"></p>
    </div>
</div>

<div class="wrapper">
    <header class="main-header">
        <div class="brand-container">
            <div class="logo-square">PL</div>
            <div class="brand-text">
                <h1>PAPELETA LICENCIA</h1>
                <p>PROTEGE TU SERVIDOR</p>
                <div style="display:flex; gap:5px;">
                    <button class="btn-action-small" onclick="clearSavedPin()">CERRAR SESIÓN</button>
                    <input type="color" id="colorPicker" onchange="updateParticleColor(this.value)" style="width:25px;height:25px;border:none;background:none;cursor:pointer;vertical-align:middle;">
                </div>
            </div>
        </div>
        <div class="stats">
            <div class="stat-card"><span>TOTAL</span><strong id="total-count">0</strong></div>
            <div class="stat-card"><span>ACTIVAS</span><strong id="active-count">0</strong></div>
        </div>
    </header>

    <div class="dashboard-grid">
        <aside>
            <div class="card">
                <h3>NUEVA LICENCIA</h3>
                <div class="input-group">
                    <label>NOMBRE DEL RECURSO</label>
                    <input type="text" id="resourceName" placeholder="EJ: SISTEMA_AUTOS">
                </div>
                <div class="input-group">
                    <label>IP SERVIDOR</label>
                    <input type="text" id="ipAddr" placeholder="127.0.0.1">
                </div>
                <button class="btn-generate" onclick="addLicense()">GENERAR Y GUARDAR</button>
                <div id="statusLog">Esperando acción...</div>
            </div>

            <div class="card">
                <h3>CONFIG.LUA</h3>
                <div class="output-area">
                    <button class="btn-copy" onclick="copyText('luaCode')">COPIAR</button>
                    <pre id="luaCode">-- Selecciona una licencia</pre>
                </div>
            </div>
        </aside>

        <section>
            <div class="card">
                <table id="licenseTable">
                    <thead>
                        <tr>
                            <th>ESTADO</th>
                            <th>RECURSO</th>
                            <th>IP</th>
                            <th>USER</th>
                            <th>ACCIÓN</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </div>
</div>

<script>
// CONFIGURACIÓN API GITHUB
const GITHUB_TOKEN = "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"; 
const OWNER = "OmarVasquez12";
const REPO = "omarvasquez12.github.io";
const PATH = "validar.json";
const PIN_CORRECTO = "0325";

let currentPColor = localStorage.getItem("papeleta_color") || "#ff1a1a";

function initParticles(color) {
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 70 },
            "color": { "value": color },
            "shape": { "type": "circle" },
            "line_linked": { "enable": true, "distance": 150, "color": color, "opacity": 0.4, "width": 1 },
            "move": { "enable": true, "speed": 2 }
        },
        "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } } }
    });
}

function updateParticleColor(val) {
    currentPColor = val;
    localStorage.setItem("papeleta_color", val);
    initParticles(val);
}

// SEGURIDAD Y LOGIN
function checkPIN(){
    const pin = document.getElementById("pinInput").value;
    if(pin === PIN_CORRECTO){
        if(document.getElementById("savePinCheck").checked) localStorage.setItem("papeleta_pin", pin);
        document.getElementById("lockScreen").style.display = "none";
    } else {
        document.getElementById("pinError").innerText = "PIN INCORRECTO";
    }
}

function clearSavedPin() { localStorage.removeItem("papeleta_pin"); location.reload(); }

// FUNCIÓN PRINCIPAL DE GUARDADO (GITHUB)
async function actualizarGitHubAutomatico(listaLicencias) {
    updateLog("🔄 Sincronizando con GitHub...");
    const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`;
    
    // Formateamos el JSON exactamente como lo necesitas
    const dataJSON = {
        licencias: listaLicencias.filter(l => l.active).map(l => ({
            user: l.user,
            key: l.key,
            status: "active"
        }))
    };

    const contenidoBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(dataJSON, null, 2))));

    try {
        const resGet = await fetch(url, { headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Cache-Control": "no-cache" } });
        if (!resGet.ok) return updateLog("❌ Error: validar.json no encontrado", true);
        
        const dataGet = await resGet.json();
        const resPut = await fetch(url, {
            method: "PUT",
            headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                message: "Update Licencias",
                content: contenidoBase64,
                sha: dataGet.sha
            })
        });

        if (resPut.ok) updateLog("✅ GitHub Actualizado");
        else updateLog("❌ Error al subir cambios", true);
    } catch (e) { updateLog("❌ Error de red", true); }
}

// LÓGICA DE LICENCIAS
function generateRandomString(length) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let result = '';
    for (let i = 0; i < length; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
    return result;
}

function addLicense(){
    const resource = document.getElementById("resourceName").value.trim().toUpperCase();
    const ip = document.getElementById("ipAddr").value.trim();
    if(!resource || !ip) return alert("Completa los datos");

    const lic = { 
        id: Date.now(), resource, ip, 
        user: "USER_" + generateRandomString(6), 
        key: generateRandomString(32), 
        active: true 
    };

    let licenses = JSON.parse(localStorage.getItem('licenses')) || [];
    licenses.push(lic);
    localStorage.setItem('licenses', JSON.stringify(licenses));

    renderRow(lic);
    updateStats();
    actualizarGitHubAutomatico(licenses);
    
    document.getElementById("resourceName").value = "";
    document.getElementById("ipAddr").value = "";
}

function renderRow(lic){
    const row = document.createElement("tr");
    row.className="clickable";
    row.dataset.id = lic.id;
    row.innerHTML = `
        <td><span class="status-dot ${lic.active?'status-on':'status-off'}" onclick="toggleStatus(${lic.id},this);event.stopPropagation();"></span></td>
        <td style="color:red;font-weight:900;">${lic.resource}</td>
        <td>${lic.ip}</td>
        <td style="font-size:11px;">${lic.user}</td>
        <td><button class="btn-delete" onclick="deleteLicense(${lic.id})">BORRAR</button></td>
    `;
    row.onclick = () => { if(lic.active) showLua(lic); };
    document.querySelector("#licenseTable tbody").prepend(row);
}

function toggleStatus(id, el){
    let licenses = JSON.parse(localStorage.getItem('licenses')) || [];
    const i = licenses.findIndex(l => l.id === id);
    licenses[i].active = !licenses[i].active;
    localStorage.setItem('licenses', JSON.stringify(licenses));
    el.className = `status-dot ${licenses[i].active?'status-on':'status-off'}`;
    updateStats();
    actualizarGitHubAutomatico(licenses);
}

function deleteLicense(id){
    if(!confirm("¿Eliminar?")) return;
    let licenses = (JSON.parse(localStorage.getItem('licenses')) || []).filter(l => l.id !== id);
    localStorage.setItem('licenses', JSON.stringify(licenses));
    document.querySelector(`tr[data-id="${id}"]`).remove();
    updateStats();
    actualizarGitHubAutomatico(licenses);
}

function showLua(l){
    document.getElementById("luaCode").innerText = `configLicense = {\n    ["User"] = "${l.user}",\n    ["Key"] = "${l.key}",\n}`;
}

function updateLog(m, e=false) { const l = document.getElementById("statusLog"); l.innerText = m; l.style.color = e ? "red" : "#00ff44"; }

function updateStats(){
    const l = JSON.parse(localStorage.getItem('licenses')) || [];
    document.getElementById("total-count").innerText = l.length;
    document.getElementById("active-count").innerText = l.filter(x => x.active).length;
}

function loadLicenses(){
    const l = JSON.parse(localStorage.getItem('licenses')) || [];
    l.forEach(renderRow);
    updateStats();
}

function copyText(id) { navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => alert("Copiado")); }

document.addEventListener('DOMContentLoaded', () => {
    initParticles(currentPColor);
    loadLicenses();
    if(localStorage.getItem("papeleta_pin") === PIN_CORRECTO) document.getElementById("lockScreen").style.display = "none";
});
</script>
</body>
</html>
